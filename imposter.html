<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101322">
<title>Imposter — JayTeeSF</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%}:root{--ink:#f8fbff;--muted:rgba(248,251,255,.70);--panel:rgba(255,255,255,.10);--line:rgba(255,255,255,.16);--hot:#ff477e;--gold:#ffd166;--cyan:#22d3ee;--violet:#8b5cf6;--green:#4ade80;--red:#fb7185;--shadow:0 26px 80px rgba(0,0,0,.48);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Inter,Arial,sans-serif}body{color:var(--ink);background:radial-gradient(800px 480px at 20% -10%,rgba(139,92,246,.35),transparent 60%),radial-gradient(760px 520px at 96% 0%,rgba(34,211,238,.20),transparent 60%),radial-gradient(700px 520px at 50% 115%,rgba(255,71,126,.22),transparent 60%),linear-gradient(135deg,#070817,#101322);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.42;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,#000,transparent 80%)}.app{width:min(1080px,100%);margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 14px calc(30px + env(safe-area-inset-bottom));position:relative}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:12px}.logo{width:54px;height:54px;border-radius:19px;display:grid;place-items:center;font-size:1.8rem;font-weight:1000;color:#101322;background:conic-gradient(from 160deg,var(--gold),#fff,var(--cyan),var(--violet),var(--hot),var(--gold));box-shadow:0 16px 38px rgba(139,92,246,.28)}h1,h2,h3,p{margin-top:0}h1{font-size:clamp(1.6rem,6vw,2.55rem);line-height:.9;letter-spacing:-.07em;margin-bottom:3px}.brand p,.muted,.card p{color:var(--muted);line-height:1.44;margin-bottom:0}.screen{display:grid;gap:14px}.card{background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.055));border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.12);padding:18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow:hidden}.hero{min-height:245px;display:flex;align-items:end;position:relative}.hero:after{content:"";position:absolute;width:260px;height:260px;border-radius:50%;right:-76px;top:-92px;background:radial-gradient(circle,rgba(255,209,102,.35),transparent 68%);animation:pulse 4s ease-in-out infinite}@keyframes pulse{50%{transform:scale(1.12);opacity:.8}}.eyebrow{text-transform:uppercase;letter-spacing:.13em;font-weight:950;color:var(--gold);font-size:.75rem}h2{font-size:clamp(2.25rem,10vw,5.3rem);line-height:.86;letter-spacing:-.09em;margin-bottom:14px;text-wrap:balance}h3{font-size:1.2rem;letter-spacing:-.04em;margin-bottom:12px}.grid{display:grid;gap:14px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,1fr)}.row{display:flex;gap:9px}input,select,textarea{width:100%;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.22);color:var(--ink);border-radius:18px;padding:14px;font:inherit;font-weight:750;outline:none}textarea{min-height:112px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.9rem}select option{background:#101322;color:white}label{display:grid;gap:7px;color:var(--muted);font-weight:850;margin:12px 0 0}button{border:0;color:var(--ink);background:rgba(255,255,255,.11);border-radius:999px;padding:13px 16px;font:inherit;font-weight:950;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);touch-action:manipulation;transition:transform .16s ease,background .16s ease,opacity .16s ease}button:active{transform:scale(.97)}button:hover{background:rgba(255,255,255,.17)}button:disabled{opacity:.45}.primary{background:linear-gradient(135deg,var(--hot),var(--violet));box-shadow:0 18px 42px rgba(255,71,126,.22),inset 0 0 0 1px rgba(255,255,255,.18)}.good{background:linear-gradient(135deg,#16a34a,var(--green));color:#06150a}.bad{background:linear-gradient(135deg,var(--red),#f97316)}.wide{width:100%;min-height:58px}.icon-btn{width:48px;height:48px;padding:0}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.tabs button{border-radius:22px}.tabs button.active{background:linear-gradient(135deg,rgba(255,71,126,.25),rgba(34,211,238,.16))}.code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:900;word-break:break-all;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:14px;line-height:1.35}.role-card{min-height:68svh;display:grid;place-items:center;text-align:center;position:relative}.lock{font-size:5.5rem;filter:drop-shadow(0 20px 30px rgba(0,0,0,.35));animation:float 1.7s ease-in-out infinite alternate}@keyframes float{to{transform:translateY(-9px) rotate(2deg)}}.secret{font-size:clamp(3rem,18vw,7.5rem);line-height:.86;letter-spacing:-.09em;font-weight:1000;margin:10px 0;background:linear-gradient(90deg,#fff,#a7f3d0,#fde68a);-webkit-background-clip:text;background-clip:text;color:transparent}.warning{color:var(--gold);font-weight:950}.badge{display:inline-flex;border-radius:999px;padding:8px 11px;background:rgba(255,255,255,.12);white-space:nowrap;font-weight:900}.badge.imposter{background:rgba(251,113,133,.25);color:#fecdd3}.badge.safe{background:rgba(74,222,128,.20);color:#bbf7d0}.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.help{border-left:3px solid rgba(255,209,102,.68);padding-left:12px;color:var(--muted);line-height:1.45}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(120%);background:rgba(9,12,25,.9);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:12px 15px;font-weight:900;box-shadow:0 20px 55px rgba(0,0,0,.45);transition:transform .25s ease;z-index:20;max-width:calc(100% - 24px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{transform:translateX(-50%) translateY(0)}@media(max-width:760px){.two,.three,.tabs{grid-template-columns:1fr}.hero{min-height:280px}.row{display:grid}.role-card{min-height:72svh}.topbar{align-items:flex-start}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><div class="logo">?</div><div><h1>Imposter</h1><p>Deterministic same-code party deduction</p></div></div><button id="resetAllBtn" class="icon-btn" title="Reset local data">↺</button></header>
<section id="screen" class="screen"></section>
</main>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(() => {
  "use strict";
  const KEY = "jayteesf-imposter-code-v2";
  const categories = {
    Food:["pizza","sushi","taco","lasagna","croissant","burrito","ramen","pancakes","guacamole","cupcake","nachos","dumplings"],
    Places:["airport","beach","casino","library","museum","stadium","subway","zoo","hospital","coffee shop","hotel lobby","ski lodge"],
    Objects:["umbrella","toothbrush","skateboard","backpack","headphones","flashlight","passport","microscope","guitar","camera","suitcase","telescope"],
    Brainscape:["flashcard","deck","confidence","streak","study session","spaced repetition","mobile app","certified class","adaptive learning","exam prep"],
    Random:["jazz","volcano","velcro","karaoke","moonwalk","pirate","origami","mystery","robot","avocado","time machine","invisible ink"]
  };
  const $ = (s,r=document) => r.querySelector(s);
  const $$ = (s,r=document) => [...r.querySelectorAll(s)];
  const now = () => new Date().toISOString();
  let state = load();

  function fresh(){ return { mode:"create", lastCode:"", lastSeat:1, updatedAt:now() }; }
  function load(){ try{ return { ...fresh(), ...JSON.parse(localStorage.getItem(KEY) || "{}") }; } catch { return fresh(); } }
  function save(){ state.updatedAt=now(); localStorage.setItem(KEY, JSON.stringify(state)); }
  function haptic(p=16){ if("vibrate" in navigator){ try{ navigator.vibrate(p); }catch{} } }
  function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toast.t); toast.t=setTimeout(()=>t.classList.remove("show"),2300); }

  function fnv1a32(str){
    let h = 0x811c9dc5;
    for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 0x01000193); }
    return h >>> 0;
  }
  function mulberry32(seed){
    return function(){ let t = seed += 0x6D2B79F5; t = Math.imul(t ^ (t >>> 15), t | 1); t ^= t + Math.imul(t ^ (t >>> 7), t | 61); return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
  }
  function seededShuffle(items, rng){
    const a = [...items];
    for(let i=a.length-1;i>0;i--){ const j = Math.floor(rng() * (i + 1)); [a[i],a[j]] = [a[j],a[i]]; }
    return a;
  }
  function checksum(str){ return fnv1a32(str).toString(36).toUpperCase().padStart(7,"0").slice(-7); }
  function base64UrlEncode(str){
    const bytes = new TextEncoder().encode(str);
    let bin = ""; bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
  }
  function base64UrlDecode(str){
    const cleaned = String(str).trim().replace(/\s+/g,"");
    const b64 = cleaned.replace(/-/g,"+").replace(/_/g,"/") + "===".slice((cleaned.length + 3) % 4);
    const bin = atob(b64);
    return new TextDecoder().decode(Uint8Array.from(bin, c => c.charCodeAt(0)));
  }
  function randomSeed(){
    const bytes = new Uint8Array(8);
    crypto.getRandomValues(bytes);
    return [...bytes].map(b => b.toString(36).padStart(2,"0")).join("").toUpperCase();
  }
  function barePayload(payload){ const {x, ...bare} = payload; return JSON.stringify(bare); }

  function createImposterRoundCode({ playerCount, imposterCount=1, category="Food", customWord="" }){
    const n = Math.max(3, Math.min(30, Number(playerCount) || 3));
    const k = Math.max(1, Math.min(n - 1, Number(imposterCount) || 1));
    const c = categories[category] ? category : "Random";
    const s = randomSeed();
    const cleanWord = String(customWord || "").trim();
    const wordList = categories[c] || categories.Random;
    const wordSeed = fnv1a32(`${s}|word|${n}|${k}|${c}`);
    const wi = cleanWord ? null : Math.floor(mulberry32(wordSeed)() * wordList.length);
    const payload = { v:1, n, k, c, w:cleanWord, wi, s };
    payload.x = checksum(barePayload(payload));
    return base64UrlEncode(JSON.stringify(payload));
  }

  function decodeImposterRoundCode(code){
    const payload = JSON.parse(base64UrlDecode(code));
    if(payload.v !== 1) throw new Error("Unsupported code version.");
    if(checksum(barePayload(payload)) !== payload.x) throw new Error("Code checksum failed.");
    if(!Number.isInteger(payload.n) || payload.n < 3 || payload.n > 30) throw new Error("Invalid player count.");
    if(!Number.isInteger(payload.k) || payload.k < 1 || payload.k >= payload.n) throw new Error("Invalid imposter count.");
    return payload;
  }

  function deriveImposterRound(code, seatNumber){
    const payload = decodeImposterRoundCode(code);
    const seat = Math.max(1, Math.min(payload.n, Number(seatNumber) || 1));
    const seats = Array.from({length: payload.n}, (_, i) => i + 1);
    const seed = fnv1a32(`${payload.s}|${payload.n}|${payload.k}|${payload.c}|${payload.w || payload.wi}|imposters`);
    const imposterSeats = seededShuffle(seats, mulberry32(seed)).slice(0, payload.k).sort((a,b)=>a-b);
    const list = categories[payload.c] || categories.Random;
    const word = payload.w || list[payload.wi % list.length];
    return {
      playerCount: payload.n,
      imposterCount: payload.k,
      category: payload.c,
      secretWord: word,
      seat,
      imposterSeats,
      isImposter: imposterSeats.includes(seat),
      roundId: checksum(barePayload(payload))
    };
  }

  window.createImposterRoundCode = createImposterRoundCode;
  window.deriveImposterRound = deriveImposterRound;

  function render(){ state.mode === "join" ? joinScreen() : createScreen(); }
  function nav(active){ return `<div class="tabs"><button class="${active==='create'?'active':''}" data-mode="create">Create code</button><button class="${active==='join'?'active':''}" data-mode="join">Join / Reveal</button></div>`; }
  function bindNav(){ $$('[data-mode]').forEach(b => b.onclick = () => { state.mode=b.dataset.mode; save(); render(); haptic(10); }); }

  function createScreen(){
    $('#screen').innerHTML = `${nav('create')}<section class="hero card"><div><span class="eyebrow">Create</span><h2>One code. Same round everywhere.</h2><p>First player creates an n-player code. Everyone else opens this page, pastes the same code, and enters their sign-up order number.</p></div></section><section class="grid two"><div class="card"><h3>Round setup</h3><label>Number of players<input id="playerCount" type="number" min="3" max="30" value="6"></label><label>Imposters<input id="imposterCount" type="number" min="1" max="6" value="1"></label><label>Category<select id="category"></select></label><label>Custom word, optional<input id="customWord" placeholder="Leave blank for seeded category word"></label><button id="makeCode" class="primary wide" style="margin-top:14px">Generate share code</button></div><div class="card"><h3>Share code</h3><p class="help">The code encodes player count, category/word, imposter count, and a random seed. No server is needed. Same code + same seat number = same role.</p><div id="codeBox" class="code" style="margin-top:14px">${state.lastCode ? esc(state.lastCode) : 'No code yet.'}</div><div class="toolbar"><button id="copyCode" ${state.lastCode?'':'disabled'}>Copy</button><button id="joinThis" ${state.lastCode?'':'disabled'} class="primary">Reveal my role</button></div></div></section>`;
    $('#category').innerHTML = Object.keys(categories).map(c=>`<option value="${c}">${c}</option>`).join('');
    $('#makeCode').onclick = () => {
      state.lastCode = createImposterRoundCode({ playerCount:$('#playerCount').value, imposterCount:$('#imposterCount').value, category:$('#category').value, customWord:$('#customWord').value });
      save(); render(); toast('Code generated.'); haptic(18);
    };
    $('#copyCode').onclick = () => copy(state.lastCode);
    $('#joinThis').onclick = () => { state.mode='join'; save(); joinScreen(); };
    bindNav();
  }

  function joinScreen(){
    $('#screen').innerHTML = `${nav('join')}<section class="card"><span class="eyebrow">Join</span><h2>Enter the same code and your sign-up order.</h2><p class="muted">Seat 1 is the first person to join/sign up, seat 2 is second, and so on. The function computes roles deterministically.</p><label>Share code<textarea id="codeInput" placeholder="Paste code here">${esc(state.lastCode)}</textarea></label><label>Your sign-up order / seat number<input id="seatInput" type="number" min="1" max="30" value="${state.lastSeat || 1}"></label><button id="revealBtn" class="primary wide" style="margin-top:14px">Reveal my role</button></section>`;
    $('#revealBtn').onclick = () => {
      try{
        state.lastCode = $('#codeInput').value.trim();
        state.lastSeat = Number($('#seatInput').value) || 1;
        save();
        showRole(deriveImposterRound(state.lastCode, state.lastSeat));
      }catch(err){ toast(err.message || 'Invalid code.'); }
    };
    bindNav();
  }

  function showRole(round){
    $('#screen').innerHTML = `<section class="card role-card"><div><div class="lock">${round.isImposter ? '🕵️' : '🔐'}</div><p class="warning">Round ${esc(round.roundId)} · Seat ${round.seat} of ${round.playerCount}</p><h2>${round.isImposter ? 'You are the imposter.' : 'You know the word.'}</h2>${round.isImposter ? `<div class="secret">BLEND IN</div><p>Category hint: <strong>${esc(round.category)}</strong>. Do not reveal that you lack the word.</p>` : `<p>Your secret word is</p><div class="secret">${esc(round.secretWord)}</div><p>Remember it, then hide the screen.</p>`}<div class="toolbar"><span class="badge ${round.isImposter?'imposter':'safe'}">${round.isImposter?'Imposter':'Knows word'}</span><span class="badge">${round.imposterCount} imposter${round.imposterCount===1?'':'s'}</span><button id="backJoin">Back</button></div></div></section>`;
    $('#backJoin').onclick = joinScreen;
    haptic(round.isImposter ? [24,40,24] : 18);
  }

  async function copy(text){
    try{ await navigator.clipboard.writeText(text); toast('Copied.'); haptic(14); }
    catch{ toast('Copy failed; select the code manually.'); }
  }
  function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
  $('#resetAllBtn').onclick = () => { if(!confirm('Reset local Imposter data?')) return; state=fresh(); save(); render(); toast('Reset complete.'); };
  save(); render();
})();
</script>
</body>
</html>
