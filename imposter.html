<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#101322"><title>Imposter — JayTeeSF</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}:root{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Inter,Arial,sans-serif;color:#f8fbff}body{min-height:100svh;margin:0;background:radial-gradient(800px 480px at 20% -10%,rgba(139,92,246,.35),transparent 60%),radial-gradient(760px 520px at 96% 0%,rgba(34,211,238,.20),transparent 60%),radial-gradient(700px 520px at 50% 115%,rgba(255,71,126,.22),transparent 60%),linear-gradient(135deg,#070817,#101322);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.42;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,#000,transparent 80%)}.app{width:min(1060px,100%);margin:0 auto;padding:calc(18px + env(safe-area-inset-top,0px)) 14px calc(30px + env(safe-area-inset-bottom,0px));position:relative}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;font-size:1.8rem;font-weight:1000;color:#101322;background:conic-gradient(from 160deg,#ffd166,#fff,#22d3ee,#8b5cf6,#ff477e,#ffd166)}h1,h2,h3,p{margin-top:0}h1{font-size:clamp(1.6rem,6vw,2.5rem);line-height:.94;letter-spacing:-.055em;margin-bottom:3px}.brand p,.card p{color:rgba(248,251,255,.68);line-height:1.42;margin-bottom:0}.screen{display:grid;gap:14px}.card{background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.055));border:1px solid rgba(255,255,255,.15);border-radius:30px;box-shadow:0 24px 72px rgba(0,0,0,.46),inset 0 1px 0 rgba(255,255,255,.12);padding:18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow:hidden}.hero{min-height:220px;display:flex;align-items:end;position:relative}.hero:after{content:"";position:absolute;width:250px;height:250px;border-radius:50%;right:-70px;top:-90px;background:radial-gradient(circle,rgba(255,209,102,.35),transparent 68%)}.eyebrow{text-transform:uppercase;letter-spacing:.13em;font-weight:950;color:#ffd166;font-size:.75rem}h2{font-size:clamp(2.25rem,9vw,5.1rem);line-height:.9;letter-spacing:-.065em;margin-bottom:14px;text-wrap:balance}h3{font-size:1.2rem;letter-spacing:-.035em;margin-bottom:14px}.grid{display:grid;gap:14px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,1fr)}input,select,textarea{width:100%;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.22);color:#f8fbff;border-radius:18px;padding:14px;font:inherit;font-weight:750;outline:none}textarea{min-height:92px;resize:vertical}select option{background:#101322;color:white}label{display:grid;gap:7px;color:rgba(248,251,255,.68);font-weight:850;margin:12px 0 0}button,.linkish{border:0;color:#f8fbff;background:rgba(255,255,255,.11);border-radius:999px;padding:13px 16px;font:inherit;font-weight:950;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);touch-action:manipulation;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}button:active,.linkish:active{transform:scale(.97)}button:disabled{opacity:.45}.primary{background:linear-gradient(135deg,#ff477e,#8b5cf6)}.good{background:linear-gradient(135deg,#16a34a,#4ade80);color:#06150a}.bad{background:linear-gradient(135deg,#fb7185,#f97316)}.wide{width:100%;min-height:58px}.icon-btn{width:48px;height:48px;padding:0}.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.code-box{display:grid;gap:9px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.13);border-radius:22px;padding:13px;margin-top:13px}.code-value{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;word-break:break-all;font-size:.86rem;line-height:1.35;color:#e9f9ff}.role-card{min-height:64svh;display:grid;place-items:center;text-align:center}.lock{font-size:5rem;filter:drop-shadow(0 20px 30px rgba(0,0,0,.35))}.secret{font-size:clamp(3rem,18vw,7.3rem);line-height:.9;letter-spacing:-.06em;font-weight:1000;margin:10px 0;background:linear-gradient(90deg,#fff,#a7f3d0,#fde68a);-webkit-background-clip:text;background-clip:text;color:transparent}.warning{color:#ffd166;font-weight:950}.badge{border-radius:999px;padding:8px 11px;background:rgba(255,255,255,.12);white-space:nowrap;font-weight:900}.table{display:grid;gap:8px;margin-top:12px}.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:rgba(0,0,0,.20);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:12px 13px;font-weight:900}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom,0px));transform:translateX(-50%) translateY(120%);background:rgba(9,12,25,.88);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:12px 15px;font-weight:900;transition:transform .25s;z-index:20;max-width:calc(100% - 24px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{transform:translateX(-50%) translateY(0)}@media(max-width:760px){.two,.three{grid-template-columns:1fr}.hero{min-height:260px}.topbar{align-items:flex-start}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}</style></head><body><main class="app"><header class="topbar"><div class="brand"><div class="logo">?</div><div><h1>Imposter</h1><p>Share a link. Pick your seat. Same code, same round.</p></div></div><button id="resetAllBtn" class="icon-btn" title="Reset local data">↺</button></header><section id="screen" class="screen"></section></main><div id="toast" class="toast" role="status" aria-live="polite"></div><script>
(()=>{"use strict";
const KEY="jayteesf-imposter-v3";
const categories={Food:["pizza","sushi","taco","lasagna","croissant","burrito","ramen","pancakes","guacamole","cupcake"],Places:["airport","beach","casino","library","museum","stadium","subway","zoo","hospital","coffee shop"],Objects:["umbrella","toothbrush","skateboard","backpack","headphones","flashlight","passport","microscope","guitar","camera"],Brainscape:["flashcard","deck","confidence","streak","study session","spaced repetition","mobile app","certified class"],Random:["jazz","volcano","velcro","karaoke","moonwalk","pirate","origami","mystery","robot","avocado"]};
const $=(s,r=document)=>r.querySelector(s),now=()=>new Date().toISOString();
let state=load();
function fresh(){return{screen:"home",createdCode:"",activeCode:getCodeFromUrl()||"",seat:"",playerName:"",updatedAt:now()}}
function load(){let base=fresh();try{base={...base,...JSON.parse(localStorage.getItem(KEY)||"{}")}}catch{}const urlCode=getCodeFromUrl();if(urlCode){base.activeCode=urlCode;base.screen="join"}return base}
function save(){state.updatedAt=now();localStorage.setItem(KEY,JSON.stringify(state))}
function getCodeFromUrl(){const raw=new URLSearchParams(location.search).get("code");return raw?raw.trim():""}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),2200)}
function haptic(p=16){if("vibrate"in navigator){try{navigator.vibrate(p)}catch{}}}
function render(){const urlCode=getCodeFromUrl();if(urlCode&&state.screen==="home"){state.activeCode=urlCode;state.screen="join";save()}if(state.screen==="create")return create();if(state.screen==="share")return share();if(state.screen==="join")return join();if(state.screen==="role")return role();return home()}
function home(){$("#screen").innerHTML=`<section class="hero card"><div><span class="eyebrow">Deterministic party mode</span><h2>Same code. Same imposter.</h2><p>The host creates a round link. Everyone opens it, chooses their sign-up order, and the page derives their role locally from the same code.</p></div></section><section class="grid two"><button id="createBtn" class="primary wide">Create game link</button><button id="joinBtn" class="wide">Join with code</button></section>`;$("#createBtn").onclick=()=>{state.screen="create";save();render()};$("#joinBtn").onclick=()=>{state.screen="join";save();render()}}
function create(){$("#screen").innerHTML=`<section class="card"><span class="eyebrow">Host setup</span><h2>Create a shareable round.</h2><p>Give players seats by sign-up order: first person is seat 1, second is seat 2, and so on.</p><div class="grid two"><label>Players<input id="n" type="number" min="3" max="30" value="6"></label><label>Imposters<input id="k" type="number" min="1" max="6" value="1"></label></div><label>Category<select id="category">${Object.keys(categories).map(c=>`<option value="${c}">${esc(c)}</option>`).join("")}</select></label><label>Custom secret word, optional<input id="word" placeholder="Leave blank to derive word from category"></label><label>Seed phrase, optional<input id="seed" placeholder="e.g. Friday night, cabin trip, pizza"></label><div class="toolbar"><button id="makeBtn" class="primary">Generate link</button><button id="backBtn">Back</button></div></section>`;
$("#makeBtn").onclick=()=>{const n=clamp(Number($("#n").value)||6,3,30),k=clamp(Number($("#k").value)||1,1,n-1),c=$("#category").value,w=$("#word").value.trim(),seedPhrase=$("#seed").value.trim();const code=createCode({n,k,c,w,seedPhrase});state.createdCode=code;state.activeCode=code;state.screen="share";save();render();haptic([18,30,18])};$("#backBtn").onclick=()=>{state.screen="home";save();render()}}
function share(){const code=state.createdCode||state.activeCode,link=shareUrl(code);let summary="";try{const r=derive(code,1);summary=`<div class="table"><div class="row"><span>Players</span><span>${r.playerCount}</span></div><div class="row"><span>Imposters</span><span>${r.imposterCount}</span></div><div class="row"><span>Category</span><span>${esc(r.category)}</span></div></div>`}catch{}$("#screen").innerHTML=`<section class="card"><span class="eyebrow">Share</span><h2>Send this link.</h2><p>Everyone opens the same link and enters their seat number. The URL contains <strong>?code=</strong>, so no one has to paste manually.</p><div class="code-box"><strong>Share link</strong><div class="code-value" id="shareLink">${esc(link)}</div><div class="toolbar"><button id="copyLinkBtn" class="primary">Copy link</button><a id="openLinkBtn" class="linkish" href="${escAttr(link)}">Open link</a></div></div><div class="code-box"><strong>Raw code</strong><div class="code-value">${esc(code)}</div></div>${summary}<div class="toolbar"><button id="myRoleBtn" class="good">View my role as seat 1</button><button id="homeBtn">Home</button></div></section>`;
$("#copyLinkBtn").onclick=async()=>{await copyText(link);toast("Link copied.")};$("#myRoleBtn").onclick=()=>{state.seat="1";state.screen="role";save();render()};$("#homeBtn").onclick=()=>{state.screen="home";save();render()}}
function join(){const code=state.activeCode||getCodeFromUrl()||"";let summary="";try{const r=derive(code,1);summary=`<div class="table"><div class="row"><span>Players</span><span>${r.playerCount}</span></div><div class="row"><span>Imposters</span><span>${r.imposterCount}</span></div><div class="row"><span>Category</span><span>${esc(r.category)}</span></div><div class="row"><span>Round</span><span>${esc(r.roundId)}</span></div></div>`}catch{}$("#screen").innerHTML=`<section class="card"><span class="eyebrow">Join</span><h2>Choose your seat.</h2><p>Your seat is your sign-up order. Everyone with the same link/code gets the same round behavior.</p><label>Round code<textarea id="codeInput" placeholder="Code is auto-filled from ?code= when present">${esc(code)}</textarea></label><div class="grid two"><label>Seat number<input id="seatInput" type="number" min="1" value="${esc(state.seat||"1")}"></label><label>Your name, optional<input id="nameInput" value="${esc(state.playerName||"")}" placeholder="For this device only"></label></div>${summary}<div class="toolbar"><button id="roleBtn" class="primary">Reveal my role</button><button id="copyJoinLinkBtn">Copy link</button><button id="backBtn">Back</button></div></section>`;
$("#codeInput").oninput=e=>{state.activeCode=e.target.value.trim();save()};$("#seatInput").oninput=e=>{state.seat=e.target.value;save()};$("#nameInput").oninput=e=>{state.playerName=e.target.value;save()};$("#roleBtn").onclick=()=>{state.activeCode=$("#codeInput").value.trim();state.seat=$("#seatInput").value;state.playerName=$("#nameInput").value.trim();try{derive(state.activeCode,state.seat)}catch(err){return toast(err.message||"Invalid code.")}state.screen="role";save();render();haptic(18)};$("#copyJoinLinkBtn").onclick=async()=>{const c=$("#codeInput").value.trim();if(!c)return toast("No code yet.");await copyText(shareUrl(c));toast("Link copied.")};$("#backBtn").onclick=()=>{state.screen="home";save();render()}}
function role(){let r;try{r=derive(state.activeCode,state.seat)}catch(err){state.screen="join";save();toast(err.message||"Invalid code.");return join()}const name=state.playerName?esc(state.playerName)+" · ":"";$("#screen").innerHTML=`<section class="card role-card"><div><div class="lock">${r.isImposter?"🕵️":"🔐"}</div><p class="warning">${name}Seat ${r.seat} of ${r.playerCount}</p>${r.isImposter?`<p class="warning">You are the</p><div class="secret">IMPOSTER</div><p>Category hint: <strong>${esc(r.category)}</strong></p>`:`<p>Your secret word is</p><div class="secret">${esc(r.secretWord)}</div><p>Do not show this screen to anyone else.</p>`}<div class="toolbar" style="justify-content:center"><button id="hideBtn" class="primary">Hide role</button><button id="shareAgainBtn">Share link</button></div></div></section><section class="card"><h3>Round details</h3><div class="table"><div class="row"><span>Round ID</span><span>${esc(r.roundId)}</span></div><div class="row"><span>Players</span><span>${r.playerCount}</span></div><div class="row"><span>Imposters</span><span>${r.imposterCount}</span></div><div class="row"><span>Your seat</span><span>${r.seat}</span></div></div></section>`;
$("#hideBtn").onclick=()=>{state.screen="join";save();render()};$("#shareAgainBtn").onclick=async()=>{await copyText(shareUrl(state.activeCode));toast("Link copied.")}}
function createCode({n,k,c,w,seedPhrase}){const list=categories[c]||categories.Random,s=toBase36(fnv(`${Date.now()}|${Math.random()}|${seedPhrase||""}`)).slice(0,7).toUpperCase(),wi=w?0:(fnv(`${s}|${c}|word`)%list.length),payload={v:1,n,k,c,wi,s};if(w)payload.w=w;const body=b64e(JSON.stringify(payload)),sig=checksum(body).slice(0,5);return `${body}.${sig}`}
function decode(code){const clean=String(code||"").trim();if(!clean)throw new Error("Missing code.");const [body,sig]=clean.split(".");if(!body||!sig||checksum(body).slice(0,5)!==sig)throw new Error("Invalid or mistyped code.");let p;try{p=JSON.parse(b64d(body))}catch{throw new Error("Invalid code.")}if(p.v!==1)throw new Error("Unsupported code version.");p.n=clamp(Number(p.n),3,30);p.k=clamp(Number(p.k),1,p.n-1);if(!categories[p.c])p.c="Random";p.wi=Number(p.wi)||0;p.s=String(p.s||"SEED");p.w=String(p.w||"").trim();return p}
function derive(code,seatNumber){const p=decode(code),seat=clamp(Number(seatNumber)||1,1,p.n),seats=Array.from({length:p.n},(_,i)=>i+1),seed=fnv(`${p.s}|${p.n}|${p.k}|${p.c}|${p.w||p.wi}|imposters`),imposterSeats=shuffleSeed(seats,mulberry32(seed)).slice(0,p.k).sort((a,b)=>a-b),list=categories[p.c]||categories.Random,secretWord=p.w||list[Math.abs(p.wi)%list.length];return{playerCount:p.n,imposterCount:p.k,category:p.c,secretWord,seat,imposterSeats,isImposter:imposterSeats.includes(seat),roundId:checksum(code).slice(0,6).toUpperCase()}}
function shareUrl(code){const url=new URL(location.href);url.search="";url.hash="";url.searchParams.set("code",code);return url.toString()}
function shuffleSeed(arr,rng){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function fnv(str){let h=0x811c9dc5;for(let i=0;i<String(str).length;i++){h^=String(str).charCodeAt(i);h=Math.imul(h,0x01000193)}return h>>>0}
function checksum(str){return toBase36(fnv(str)).toUpperCase()}
function toBase36(n){return(n>>>0).toString(36)}
function b64e(str){return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"")}
function b64d(str){let s=String(str).replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";return decodeURIComponent(escape(atob(s)))}
function clamp(n,min,max){return Math.max(min,Math.min(max,n))}
async function copyText(text){try{await navigator.clipboard.writeText(text)}catch{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove()}haptic(12)}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function escAttr(s){return esc(s).replace(/`/g,"&#096;")}
$("#resetAllBtn").onclick=()=>{if(!confirm("Reset Imposter local data on this device?"))return;state=fresh();save();render();toast("Reset complete.")};save();render();
})();
</script></body></html>
