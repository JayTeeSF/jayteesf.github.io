<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101322" />
  <title>Imposter Game</title>
  <style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} :root{--bg:#080a14;--panel:rgba(255,255,255,.09);--line:rgba(255,255,255,.14);--text:#f8fbff;--muted:rgba(248,251,255,.68);--hot:#ff477e;--gold:#ffd166;--cyan:#22d3ee;--violet:#8b5cf6;--green:#4ade80;--red:#fb7185;--shadow:0 22px 70px rgba(0,0,0,.45);--radius:28px;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Inter,Arial,sans-serif}
body{min-height:100svh;margin:0;color:var(--text);background:radial-gradient(800px 480px at 20% -10%,rgba(139,92,246,.35),transparent 60%),radial-gradient(760px 520px at 96% 0%,rgba(34,211,238,.20),transparent 60%),radial-gradient(700px 520px at 50% 115%,rgba(255,71,126,.22),transparent 60%),linear-gradient(135deg,#070817,#101322);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.45;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,#000,transparent 80%)}
.app{width:min(1060px,100%);margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 14px calc(30px + env(safe-area-inset-bottom));position:relative}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;font-size:1.8rem;font-weight:1000;color:#101322;background:conic-gradient(from 160deg,var(--gold),#fff,var(--cyan),var(--violet),var(--hot),var(--gold));box-shadow:0 16px 38px rgba(139,92,246,.28)}
h1,h2,h3,p{margin-top:0}h1{font-size:clamp(1.6rem,6vw,2.5rem);line-height:.9;letter-spacing:-.07em;margin-bottom:3px}.brand p,.card p{color:var(--muted);line-height:1.42;margin-bottom:0}.screen{display:grid;gap:14px}.card{background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.055));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.12);padding:18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow:hidden}.hero{min-height:220px;display:flex;align-items:end;position:relative}.hero:after{content:"";position:absolute;width:250px;height:250px;border-radius:50%;right:-70px;top:-90px;background:radial-gradient(circle,rgba(255,209,102,.35),transparent 68%);animation:pulse 4s ease-in-out infinite}@keyframes pulse{50%{transform:scale(1.12);opacity:.8}}
.eyebrow{text-transform:uppercase;letter-spacing:.13em;font-weight:950;color:var(--gold);font-size:.75rem}h2{font-size:clamp(2.3rem,10vw,5.4rem);line-height:.86;letter-spacing:-.09em;margin-bottom:14px;text-wrap:balance}h3{font-size:1.2rem;letter-spacing:-.04em;margin-bottom:14px}.grid{display:grid;gap:14px}.two{grid-template-columns:1fr 1fr}.row{display:flex;gap:9px}input,select{width:100%;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.22);color:var(--text);border-radius:18px;padding:14px;font:inherit;font-weight:750;outline:none}select option{background:#101322;color:white}label{display:grid;gap:7px;color:var(--muted);font-weight:850;margin:12px 0 0}.toggle{grid-template-columns:auto 1fr;align-items:center}.toggle input{width:20px;height:20px}
button{border:0;color:var(--text);background:rgba(255,255,255,.11);border-radius:999px;padding:13px 16px;font:inherit;font-weight:950;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);touch-action:manipulation;transition:transform .16s ease,background .16s ease,opacity .16s ease}button:active{transform:scale(.97)}button:hover{background:rgba(255,255,255,.17)}button:disabled{opacity:.45}.primary{background:linear-gradient(135deg,var(--hot),var(--violet));box-shadow:0 18px 42px rgba(255,71,126,.22),inset 0 0 0 1px rgba(255,255,255,.18)}.good{background:linear-gradient(135deg,#16a34a,var(--green));color:#06150a}.bad{background:linear-gradient(135deg,var(--red),#f97316)}.wide{width:100%;min-height:58px}.icon-btn{width:48px;height:48px;padding:0}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 10px;font-weight:850}.chip button{width:26px;height:26px;padding:0;background:rgba(0,0,0,.20)}.settings{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.private-card{min-height:68svh;display:grid;place-items:center;text-align:center;position:relative}.private-card .lock{font-size:5.5rem;filter:drop-shadow(0 20px 30px rgba(0,0,0,.35));animation:float 1.7s ease-in-out infinite alternate}@keyframes float{to{transform:translateY(-9px) rotate(2deg)}}.secret{font-size:clamp(3rem,18vw,7.5rem);line-height:.86;letter-spacing:-.09em;font-weight:1000;margin:10px 0;background:linear-gradient(90deg,#fff,#a7f3d0,#fde68a);-webkit-background-clip:text;background-clip:text;color:transparent}.warning{color:var(--gold);font-weight:950}.timer{font-size:clamp(4rem,22vw,9rem);line-height:.85;font-weight:1000;letter-spacing:-.08em;text-align:center}.vote-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:12px}.player-vote{min-height:80px;border-radius:22px}.reveal-list{display:grid;gap:10px;margin-top:14px}.reveal-row{display:flex;justify-content:space-between;gap:10px;align-items:center;background:rgba(0,0,0,.20);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:14px;font-weight:900}.badge{border-radius:999px;padding:8px 11px;background:rgba(255,255,255,.12);white-space:nowrap}.badge.imposter{background:rgba(251,113,133,.25);color:#fecdd3}.badge.safe{background:rgba(74,222,128,.20);color:#bbf7d0}.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(120%);background:rgba(9,12,25,.88);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:12px 15px;font-weight:900;box-shadow:0 20px 55px rgba(0,0,0,.45);transition:transform .25s ease;z-index:20;max-width:calc(100% - 24px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:760px){.two,.settings{grid-template-columns:1fr}.hero{min-height:260px}.row{display:grid}.private-card{min-height:72svh}.topbar{align-items:flex-start}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

</style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand"><div class="logo">?</div><div><h1>Imposter</h1><p>Pass-the-phone party deduction game</p></div></div>
      <button id="resetAllBtn" class="icon-btn" title="Reset all data">↺</button>
    </header>
    <section id="screen" class="screen"></section>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <template id="setupTemplate">
    <section class="hero card"><div><span class="eyebrow">Setup</span><h2>One word. One imposter. Zero trust.</h2><p>Add players, pick a category or custom secret word, then pass the phone so each player privately reveals their role.</p></div></section>
    <section class="grid two">
      <div class="card"><h3>Players</h3><div class="row"><input id="playerInput" placeholder="Player name" autocomplete="off" /><button id="addPlayerBtn">Add</button></div><div id="playersList" class="chips"></div></div>
      <div class="card"><h3>Secret</h3><label>Category<select id="categorySelect"></select></label><label>Custom word, optional<input id="customWordInput" placeholder="e.g. Lasagna, Golden Gate, Velcro" /></label><label class="toggle"><input id="showCategoryHint" type="checkbox" checked /><span>Show category hint to everyone</span></label></div>
    </section>
    <section class="card"><h3>Round settings</h3><div class="settings"><label>Imposters<input id="imposterCount" type="number" min="1" max="4" value="1" /></label><label>Discussion minutes<input id="discussionMinutes" type="number" min="1" max="20" value="5" /></label></div><button id="startBtn" class="primary wide">Start round</button></section>
  </template>
  <script>
(() => {
  "use strict";
  const KEY = "jayteesf-imposter-game-v1";
  const categories = {
    Food: ["pizza","sushi","taco","lasagna","croissant","burrito","ramen","pancakes","guacamole","cupcake"],
    Places: ["airport","beach","casino","library","museum","stadium","subway","zoo","hospital","coffee shop"],
    Objects: ["umbrella","toothbrush","skateboard","backpack","headphones","flashlight","passport","microscope","guitar","camera"],
    Brainscape: ["flashcard","deck","confidence","streak","study session","spaced repetition","mobile app","certified class"],
    Random: ["jazz","volcano","velcro","karaoke","moonwalk","pirate","origami","mystery","robot","avocado"]
  };
  const $ = (s, r=document) => r.querySelector(s);
  const $$ = (s, r=document) => [...r.querySelectorAll(s)];
  const pick = a => a[Math.floor(Math.random() * a.length)];
  const now = () => new Date().toISOString();
  let state = load();
  let timer = null;

  function fresh() {
    return { players:["Jay","Sam","Alex"], category:"Food", customWord:"", showCategoryHint:true, imposterCount:1, discussionMinutes:5, round:null, history:[], updatedAt:now() };
  }
  function load() { try { return { ...fresh(), ...JSON.parse(localStorage.getItem(KEY) || "{}") }; } catch { return fresh(); } }
  function save() { state.updatedAt = now(); localStorage.setItem(KEY, JSON.stringify(state)); }
  function haptic(pattern=16) { if ("vibrate" in navigator) { try { navigator.vibrate(pattern); } catch {} } }
  function toast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toast.t); toast.t = setTimeout(() => t.classList.remove("show"), 2200); }
  function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

  function render() {
    if (!state.round) return renderSetup();
    if (state.round.phase === "reveal") return renderReveal();
    if (state.round.phase === "discussion") return renderDiscussion();
    if (state.round.phase === "vote") return renderVote();
    if (state.round.phase === "results") return renderResults();
  }

  function renderSetup() {
    clearInterval(timer);
    $("#screen").innerHTML = $("#setupTemplate").innerHTML;
    const categorySelect = $("#categorySelect");
    categorySelect.innerHTML = Object.keys(categories).map(c => `<option value="${c}">${c}</option>`).join("");
    categorySelect.value = state.category;
    $("#customWordInput").value = state.customWord || "";
    $("#showCategoryHint").checked = !!state.showCategoryHint;
    $("#imposterCount").value = state.imposterCount;
    $("#discussionMinutes").value = state.discussionMinutes;
    $("#addPlayerBtn").onclick = addPlayer;
    $("#playerInput").onkeydown = e => { if (e.key === "Enter") addPlayer(); };
    categorySelect.onchange = e => { state.category = e.target.value; save(); };
    $("#customWordInput").oninput = e => { state.customWord = e.target.value; save(); };
    $("#showCategoryHint").onchange = e => { state.showCategoryHint = e.target.checked; save(); };
    $("#imposterCount").oninput = e => { state.imposterCount = Number(e.target.value); save(); };
    $("#discussionMinutes").oninput = e => { state.discussionMinutes = Number(e.target.value); save(); };
    $("#startBtn").onclick = startRound;
    renderPlayers();
  }

  function renderPlayers() {
    $("#playersList").innerHTML = state.players.map((p, i) => `<span class="chip">${esc(p)} <button data-remove="${i}" aria-label="Remove ${esc(p)}">×</button></span>`).join("");
    $$('[data-remove]').forEach(b => b.onclick = () => { state.players.splice(Number(b.dataset.remove), 1); save(); renderPlayers(); haptic(10); });
  }
  function addPlayer() {
    const input = $("#playerInput"), name = input.value.trim();
    if (!name) return;
    if (state.players.some(p => p.toLowerCase() === name.toLowerCase())) return toast("That player is already in.");
    state.players.push(name); input.value = ""; save(); renderPlayers(); haptic(12);
  }

  function startRound() {
    const players = state.players.map(p => p.trim()).filter(Boolean);
    if (players.length < 3) return toast("Add at least 3 players.");
    const imposterCount = Math.max(1, Math.min(Number(state.imposterCount) || 1, players.length - 1));
    const word = (state.customWord || "").trim() || pick(categories[state.category] || categories.Random);
    const imposters = new Set(shuffle(players).slice(0, imposterCount));
    state.round = { id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()), phase:"reveal", word, category:state.category, showCategoryHint:state.showCategoryHint, players, imposters:[...imposters], revealIndex:0, roleVisible:false, votes:{}, startedAt:now(), discussionEndsAt:null };
    save(); haptic([18,30,18]); render();
  }

  function renderReveal() {
    const r = state.round, player = r.players[r.revealIndex], isImp = r.imposters.includes(player);
    $("#screen").innerHTML = `<section class="card private-card"><div><div class="lock">${r.roleVisible ? (isImp ? "🕵️" : "🔐") : "🤫"}</div><p class="warning">Private reveal for</p><h2>${esc(player)}</h2>${r.roleVisible ? (isImp ? `<p class="warning">You are the</p><div class="secret">IMPOSTER</div><p>${r.showCategoryHint ? `Category hint: <strong>${esc(r.category)}</strong>` : "Blend in. Ask questions. Do not get caught."}</p>` : `<p>Your secret word is</p><div class="secret">${esc(r.word)}</div><p>Remember it, then hide the screen before passing the phone.</p>`) : `<p>Only ${esc(player)} should look at this screen.</p>`}<div class="toolbar"><button id="toggleRoleBtn" class="primary">${r.roleVisible ? "Hide" : "Reveal my role"}</button><button id="nextRevealBtn" ${r.roleVisible ? "" : "disabled"}>${r.revealIndex === r.players.length - 1 ? "Start discussion" : "Next player"}</button></div></div></section>`;
    $("#toggleRoleBtn").onclick = () => { r.roleVisible = !r.roleVisible; save(); render(); haptic(r.roleVisible ? 22 : 8); };
    $("#nextRevealBtn").onclick = () => { if (!r.roleVisible) return; r.roleVisible = false; if (r.revealIndex >= r.players.length - 1) { r.phase = "discussion"; r.discussionEndsAt = Date.now() + (Number(state.discussionMinutes) || 5) * 60000; } else r.revealIndex++; save(); render(); haptic(14); };
  }

  function renderDiscussion() {
    const r = state.round;
    $("#screen").innerHTML = `<section class="card private-card"><div><span class="eyebrow">Discuss</span><div id="timer" class="timer">--:--</div><p>Ask suspiciously normal questions. The imposter is trying to infer the word.</p><div class="toolbar"><button id="voteBtn" class="primary">Vote now</button><button id="addMinuteBtn">+1 minute</button><button id="endBtn" class="bad">End round</button></div></div></section>`;
    $("#voteBtn").onclick = () => { r.phase = "vote"; save(); render(); };
    $("#addMinuteBtn").onclick = () => { r.discussionEndsAt += 60000; save(); renderClock(); haptic(12); };
    $("#endBtn").onclick = () => { r.phase = "results"; save(); render(); };
    clearInterval(timer); timer = setInterval(renderClock, 250); renderClock();
  }
  function renderClock() {
    if (!state.round || state.round.phase !== "discussion") return clearInterval(timer);
    const remaining = Math.max(0, state.round.discussionEndsAt - Date.now());
    const m = Math.floor(remaining / 60000), s = Math.floor((remaining % 60000) / 1000);
    const el = $("#timer"); if (el) el.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    if (remaining <= 0) { clearInterval(timer); state.round.phase = "vote"; save(); haptic([30,50,30]); render(); }
  }

  function renderVote() {
    const r = state.round, voter = r.players[Object.keys(r.votes).length];
    if (!voter) { r.phase = "results"; save(); return render(); }
    $("#screen").innerHTML = `<section class="card"><span class="eyebrow">Vote</span><h2>${esc(voter)}, who is the imposter?</h2><p>Votes are hidden until results. Pass the phone after voting.</p><div class="vote-grid">${r.players.map(p => `<button class="player-vote" data-vote="${attr(p)}">${esc(p)}</button>`).join("")}</div></section>`;
    $$('[data-vote]').forEach(btn => btn.onclick = () => { r.votes[voter] = btn.dataset.vote; save(); haptic(18); render(); });
  }

  function renderResults() {
    const r = state.round, tally = {};
    Object.values(r.votes).forEach(v => tally[v] = (tally[v] || 0) + 1);
    const topVotes = Math.max(0, ...Object.values(tally));
    const accused = Object.entries(tally).filter(([_, n]) => n === topVotes).map(([p]) => p);
    const caught = accused.some(p => r.imposters.includes(p));
    $("#screen").innerHTML = `<section class="hero card"><div><span class="eyebrow">Results</span><h2>${caught ? "Caught." : "The imposter escaped."}</h2><p>The secret word was <strong>${esc(r.word)}</strong>.</p></div></section><section class="card"><h3>Roles</h3><div class="reveal-list">${r.players.map(p => `<div class="reveal-row"><span>${esc(p)}</span><span class="badge ${r.imposters.includes(p) ? "imposter" : "safe"}">${r.imposters.includes(p) ? "Imposter" : "Knows word"}</span></div>`).join("")}</div></section><section class="card"><h3>Votes</h3><div class="reveal-list">${Object.entries(r.votes).map(([voter, vote]) => `<div class="reveal-row"><span>${esc(voter)}</span><span class="badge">voted ${esc(vote)}</span></div>`).join("") || "<p>No votes recorded.</p>"}</div><div class="toolbar"><button id="againBtn" class="primary">Play again</button><button id="setupBtn">Back to setup</button></div></section>`;
    $("#againBtn").onclick = () => { finish(caught); startRound(); };
    $("#setupBtn").onclick = () => { finish(caught); render(); };
  }
  function finish(caught) { state.history.unshift({ ...state.round, completedAt:now(), caught }); state.history = state.history.slice(0, 25); state.round = null; save(); }
  function esc(str) { return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
  function attr(str) { return esc(str).replace(/`/g, "&#096;"); }

  $("#resetAllBtn").onclick = () => { if (!confirm("Reset Imposter game data on this device?")) return; clearInterval(timer); state = fresh(); save(); render(); toast("Reset complete."); };
  save(); render();
})();

</script>
</body>
</html>
