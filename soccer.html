<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pocket Pixel Soccer</title>
  <style>
    :root {
      --case: #24282d;
      --case2: #14171a;
      --panel: #9daa75;
      --panel-dark: #66704a;
      --ink: #1e281c;
      --ink-faint: rgba(30, 40, 28, .22);
      --accent: #e1d27b;
      --button: #333941;
      --button-hi: #4a535e;
      --danger: #b95d46;
      --text: #f5f0d8;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 10%, #3e4650 0 0.4rem, transparent 0.45rem),
        linear-gradient(160deg, #14171b, #050607);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
               max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    .game {
      width: min(100%, 430px);
      min-height: min(100dvh - 24px, 840px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
      padding: 16px;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.08), transparent 35%),
        linear-gradient(180deg, var(--case), var(--case2));
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.1),
        inset 0 -6px 18px rgba(0,0,0,.45),
        0 22px 60px rgba(0,0,0,.55);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      letter-spacing: .06em;
    }

    h1 {
      margin: 0;
      font-size: clamp(18px, 5vw, 25px);
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 2px 0 #000;
    }

    .brand {
      color: var(--accent);
      font-size: 12px;
      margin-top: 4px;
      opacity: .9;
    }

    .sound {
      border: 0;
      color: var(--text);
      background: #111;
      border-radius: 999px;
      padding: 9px 12px;
      font: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: #101214;
      box-shadow: inset 0 2px 10px rgba(0,0,0,.65);
      text-transform: uppercase;
      font-weight: 700;
    }

    .scorebox {
      display: grid;
      gap: 4px;
      font-size: 11px;
      color: #c9c0a6;
    }

    .scorebox:last-child { text-align: right; }

    .score {
      color: #fff5bd;
      font-size: 24px;
      line-height: 1;
      text-shadow: 0 0 7px rgba(255,245,189,.35);
    }

    .timer {
      min-width: 86px;
      text-align: center;
      color: #151b14;
      background: var(--accent);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 19px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.22);
    }

    .screen-wrap {
      position: relative;
      padding: 14px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent),
        #080a0b;
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.04),
        inset 0 0 26px rgba(0,0,0,.8);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 2;
      border-radius: 12px;
      background: var(--panel);
      image-rendering: pixelated;
      box-shadow:
        inset 0 0 0 4px rgba(20,26,18,.35),
        inset 0 0 42px rgba(20,26,18,.28);
    }

    .overlay {
      position: absolute;
      inset: 14px;
      display: grid;
      place-items: center;
      padding: 20px;
      border-radius: 12px;
      background: rgba(20, 25, 18, .74);
      color: #f6f1ce;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .card {
      max-width: 280px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(0,0,0,.42);
      border: 1px solid rgba(255,255,255,.14);
    }

    .card h2 {
      margin: 0 0 8px;
      color: #fff3ad;
      font-size: 22px;
      text-transform: uppercase;
    }

    .card p {
      margin: 0 0 14px;
      font-size: 13px;
      line-height: 1.45;
    }

    .card button,
    .restart {
      border: 0;
      border-radius: 12px;
      padding: 12px 15px;
      background: var(--accent);
      color: #1a1a12;
      font: inherit;
      font-weight: 800;
      text-transform: uppercase;
      box-shadow: 0 4px 0 #8d8242;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 20px;
      padding: 4px 2px 0;
    }

    .dpad {
      width: min(44vw, 180px);
      aspect-ratio: 1;
      display: grid;
      grid-template:
        ". up ." 1fr
        "left mid right" 1fr
        ". down ." 1fr / 1fr 1fr 1fr;
      gap: 8px;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      color: #f8f2dd;
      background: linear-gradient(180deg, var(--button-hi), var(--button));
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.11),
        0 5px 0 #15181c,
        0 9px 16px rgba(0,0,0,.32);
      font: inherit;
      font-weight: 900;
      touch-action: none;
    }

    .btn:active,
    .btn.down {
      transform: translateY(4px);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.06),
        0 1px 0 #15181c,
        0 5px 9px rgba(0,0,0,.32);
      background: linear-gradient(180deg, #303741, #22272d);
    }

    .up { grid-area: up; }
    .down-dir { grid-area: down; }
    .left { grid-area: left; }
    .right { grid-area: right; }
    .mid {
      grid-area: mid;
      border-radius: 50%;
      opacity: .35;
      pointer-events: none;
    }

    .actions {
      justify-self: end;
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .kick {
      width: min(34vw, 142px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: linear-gradient(180deg, #d56f55, var(--danger));
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.16),
        0 7px 0 #6c3127,
        0 12px 20px rgba(0,0,0,.35);
      font-size: clamp(16px, 4vw, 20px);
      color: #fff6dc;
    }

    .kick:active,
    .kick.down {
      transform: translateY(5px);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.08),
        0 2px 0 #6c3127,
        0 7px 12px rgba(0,0,0,.35);
    }

    .hint {
      margin: 0;
      color: #c7bea4;
      font-size: 11px;
      line-height: 1.35;
      text-align: center;
      opacity: .9;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: #beb69d;
      font-size: 10px;
      opacity: .85;
    }

    @media (max-height: 710px) {
      .game { gap: 8px; padding: 12px; }
      header { display: none; }
      .screen-wrap { padding: 10px; }
      .overlay { inset: 10px; }
      .controls { gap: 12px; }
      .hint, footer { display: none; }
      .kick { width: min(31vw, 120px); }
      .dpad { width: min(41vw, 150px); }
    }
  </style>
</head>

<body>
  <main class="game" aria-label="Pocket Pixel Soccer game">
    <header>
      <div>
        <h1>Pocket Pixel Soccer</h1>
        <div class="brand">retro handheld LCD style</div>
      </div>
      <button id="soundBtn" class="sound" type="button" aria-label="Toggle sound">sound on</button>
    </header>

    <section class="scoreboard" aria-live="polite">
      <div class="scorebox"><span>You</span><strong id="youScore" class="score">0</strong></div>
      <div id="clock" class="timer">02:00</div>
      <div class="scorebox"><span>CPU</span><strong id="cpuScore" class="score">0</strong></div>
    </section>

    <section class="screen-wrap">
      <canvas id="field" width="540" height="360" aria-label="Soccer field"></canvas>

      <div id="overlay" class="overlay show">
        <div class="card">
          <h2 id="overlayTitle">Kickoff!</h2>
          <p id="overlayText">Move the dark square. Bump the ball or press KICK when close. Score into the right goal.</p>
          <button id="startBtn" type="button">Start</button>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="Touch controls">
      <div class="dpad">
        <button class="btn up" data-dir="up" type="button" aria-label="Move up">▲</button>
        <button class="btn left" data-dir="left" type="button" aria-label="Move left">◀</button>
        <button class="btn mid" type="button" tabindex="-1"></button>
        <button class="btn right" data-dir="right" type="button" aria-label="Move right">▶</button>
        <button class="btn down-dir" data-dir="down" type="button" aria-label="Move down">▼</button>
      </div>

      <div class="actions">
        <button id="kickBtn" class="btn kick" type="button">KICK</button>
        <p class="hint">Keyboard: arrows/WASD + space<br>Mobile: hold a direction, tap kick</p>
      </div>
    </section>

    <footer>
      <span>tiny-square footballer simulator</span>
      <button id="restartBtn" class="restart" type="button">restart</button>
    </footer>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("field");
      const ctx = canvas.getContext("2d");
      const youScoreEl = document.getElementById("youScore");
      const cpuScoreEl = document.getElementById("cpuScore");
      const clockEl = document.getElementById("clock");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");
      const startBtn = document.getElementById("startBtn");
      const restartBtn = document.getElementById("restartBtn");
      const soundBtn = document.getElementById("soundBtn");
      const kickBtn = document.getElementById("kickBtn");

      const W = canvas.width;
      const H = canvas.height;
      const cell = 10;
      const field = { x: 38, y: 34, w: W - 76, h: H - 68 };
      const goalH = 94;
      const goalY = H / 2 - goalH / 2;
      const goalW = 18;

      const keys = new Set();
      let last = performance.now();
      let running = false;
      let paused = true;
      let ended = false;
      let timeLeft = 120;
      let youScore = 0;
      let cpuScore = 0;
      let messageTimer = 0;
      let shake = 0;
      let soundOn = true;
      let audioCtx = null;

      const player = makePlayer(field.x + 70, H / 2, 0, "you");
      const friends = [
        makePlayer(field.x + 130, H / 2 - 78, 0, "friend"),
        makePlayer(field.x + 132, H / 2 + 78, 0, "friend")
      ];
      const enemies = [
        makePlayer(field.x + field.w - 82, H / 2, Math.PI, "cpu"),
        makePlayer(field.x + field.w - 156, H / 2 - 88, Math.PI, "cpu"),
        makePlayer(field.x + field.w - 156, H / 2 + 88, Math.PI, "cpu")
      ];
      const ball = { x: W / 2, y: H / 2, vx: 0, vy: 0, r: 7 };

      function makePlayer(x, y, angle, team) {
        return { x, y, vx: 0, vy: 0, angle, team, size: 14, cool: 0 };
      }

      function resetPositions(scoringSide) {
        player.x = field.x + 72;
        player.y = H / 2;
        player.vx = player.vy = 0;
        player.angle = 0;

        friends[0].x = field.x + 130;
        friends[0].y = H / 2 - 78;
        friends[1].x = field.x + 132;
        friends[1].y = H / 2 + 78;
        friends.forEach((p) => {
          p.vx = p.vy = 0;
          p.angle = 0;
        });

        enemies[0].x = field.x + field.w - 82;
        enemies[0].y = H / 2;
        enemies[1].x = field.x + field.w - 156;
        enemies[1].y = H / 2 - 88;
        enemies[2].x = field.x + field.w - 156;
        enemies[2].y = H / 2 + 88;
        enemies.forEach((p) => {
          p.vx = p.vy = 0;
          p.angle = Math.PI;
        });

        ball.x = W / 2 + (scoringSide === "you" ? -34 : scoringSide === "cpu" ? 34 : 0);
        ball.y = H / 2;
        ball.vx = scoringSide === "you" ? -30 : scoringSide === "cpu" ? 30 : 0;
        ball.vy = 0;
      }

      function showOverlay(title, text, buttonText = "Start") {
        paused = true;
        overlayTitle.textContent = title;
        overlayText.textContent = text;
        startBtn.textContent = buttonText;
        overlay.classList.add("show");
      }

      function hideOverlay() {
        overlay.classList.remove("show");
        if (!ended) {
          paused = false;
          running = true;
          last = performance.now();
        }
      }

      function startGame() {
        youScore = 0;
        cpuScore = 0;
        timeLeft = 120;
        ended = false;
        running = true;
        messageTimer = 0;
        updateHud();
        resetPositions();
        hideOverlay();
        beep(440, .035, "square", .045);
      }

      function endGame() {
        ended = true;
        running = false;
        const title = youScore > cpuScore ? "You Win!" : youScore < cpuScore ? "CPU Wins" : "Draw";
        showOverlay(title, `Final score ${youScore}-${cpuScore}. Tap restart for another match.`, "Restart");
        beep(youScore >= cpuScore ? 660 : 220, .12, "square", .055);
      }

      function updateHud() {
        youScoreEl.textContent = youScore;
        cpuScoreEl.textContent = cpuScore;
        const m = Math.floor(timeLeft / 60);
        const s = Math.max(0, Math.floor(timeLeft % 60));
        clockEl.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      function step(now) {
        requestAnimationFrame(step);
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;

        if (running && !paused && !ended) update(dt);
        render();
      }

      function update(dt) {
        timeLeft -= dt;
        if (timeLeft <= 0) {
          timeLeft = 0;
          updateHud();
          endGame();
          return;
        }
        updateHud();

        messageTimer = Math.max(0, messageTimer - dt);
        shake = Math.max(0, shake - dt * 20);

        updateHuman(dt);
        updateFriends(dt);
        updateEnemies(dt);
        updateBall(dt);

        [player, ...friends, ...enemies].forEach((p) => {
          p.cool = Math.max(0, p.cool - dt);
          movePlayer(p, dt);
          hitBall(p);
        });

        collidePlayers([player, ...friends, ...enemies]);
      }

      function inputVector() {
        let x = 0, y = 0;
        if (keys.has("ArrowLeft") || keys.has("a")) x -= 1;
        if (keys.has("ArrowRight") || keys.has("d")) x += 1;
        if (keys.has("ArrowUp") || keys.has("w")) y -= 1;
        if (keys.has("ArrowDown") || keys.has("s")) y += 1;
        const len = Math.hypot(x, y) || 1;
        return { x: x / len, y: y / len };
      }

      function updateHuman(dt) {
        const v = inputVector();
        const accel = 560;
        player.vx += v.x * accel * dt;
        player.vy += v.y * accel * dt;
        if (Math.hypot(v.x, v.y) > .2) player.angle = Math.atan2(v.y, v.x);
      }

      function updateFriends(dt) {
        friends.forEach((p, i) => {
          const homeX = field.x + 142 + i * 18;
          const homeY = i === 0 ? H / 2 - 82 : H / 2 + 82;
          const nearBall = dist(p, ball) < 94 || ball.x < W / 2;
          const tx = nearBall ? ball.x - 28 : homeX;
          const ty = nearBall ? ball.y + (i === 0 ? -22 : 22) : homeY;
          steer(p, tx, ty, 270, dt);
          if (dist(p, ball) < 23 && p.cool <= 0) kickFrom(p, 150, 0);
        });
      }

      function updateEnemies(dt) {
        enemies.forEach((p, i) => {
          let tx, ty;
          if (i === 0 || ball.x > W / 2 - 20) {
            tx = ball.x + 12;
            ty = ball.y;
          } else {
            tx = field.x + field.w - 150;
            ty = i === 1 ? H / 2 - 80 : H / 2 + 80;
          }
          steer(p, tx, ty, 305, dt);

          if (dist(p, ball) < 24 && p.cool <= 0) {
            const towardPlayerGoal = Math.atan2((H / 2) - p.y, (field.x - 8) - p.x);
            kickFrom(p, 165, towardPlayerGoal);
          }
        });
      }

      function steer(p, tx, ty, accel, dt) {
        const dx = tx - p.x;
        const dy = ty - p.y;
        const len = Math.hypot(dx, dy) || 1;
        p.vx += (dx / len) * accel * dt;
        p.vy += (dy / len) * accel * dt;
        if (len > 2) p.angle = Math.atan2(dy, dx);
      }

      function movePlayer(p, dt) {
        const max = p.team === "you" ? 118 : 96;
        const speed = Math.hypot(p.vx, p.vy);
        if (speed > max) {
          p.vx = p.vx / speed * max;
          p.vy = p.vy / speed * max;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= Math.pow(.001, dt);
        p.vy *= Math.pow(.001, dt);

        const margin = p.size / 2;
        p.x = clamp(p.x, field.x + margin, field.x + field.w - margin);
        p.y = clamp(p.y, field.y + margin, field.y + field.h - margin);
      }

      function updateBall(dt) {
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        ball.vx *= Math.pow(.22, dt);
        ball.vy *= Math.pow(.22, dt);

        if (ball.y - ball.r < field.y) {
          ball.y = field.y + ball.r;
          ball.vy = Math.abs(ball.vy) * .72;
          wallBeep();
        }
        if (ball.y + ball.r > field.y + field.h) {
          ball.y = field.y + field.h - ball.r;
          ball.vy = -Math.abs(ball.vy) * .72;
          wallBeep();
        }

        const inGoalMouth = ball.y > goalY && ball.y < goalY + goalH;

        if (ball.x - ball.r < field.x) {
          if (inGoalMouth) score("cpu");
          else {
            ball.x = field.x + ball.r;
            ball.vx = Math.abs(ball.vx) * .78;
            wallBeep();
          }
        }
        if (ball.x + ball.r > field.x + field.w) {
          if (inGoalMouth) score("you");
          else {
            ball.x = field.x + field.w - ball.r;
            ball.vx = -Math.abs(ball.vx) * .78;
            wallBeep();
          }
        }
      }

      function hitBall(p) {
        const dx = ball.x - p.x;
        const dy = ball.y - p.y;
        const d = Math.hypot(dx, dy);
        const minD = p.size * .75 + ball.r;
        if (d > 0 && d < minD) {
          const nx = dx / d;
          const ny = dy / d;
          ball.x = p.x + nx * minD;
          ball.y = p.y + ny * minD;
          ball.vx += nx * 72 + p.vx * .72;
          ball.vy += ny * 72 + p.vy * .72;
          p.vx -= nx * 15;
          p.vy -= ny * 15;
          beep(210 + Math.min(350, Math.hypot(ball.vx, ball.vy)), .018, "square", .025);
        }
      }

      function collidePlayers(players) {
        for (let i = 0; i < players.length; i++) {
          for (let j = i + 1; j < players.length; j++) {
            const a = players[i], b = players[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const d = Math.hypot(dx, dy) || 1;
            const minD = (a.size + b.size) * .53;
            if (d < minD) {
              const push = (minD - d) / 2;
              const nx = dx / d, ny = dy / d;
              a.x -= nx * push; a.y -= ny * push;
              b.x += nx * push; b.y += ny * push;
              a.vx -= nx * 12; a.vy -= ny * 12;
              b.vx += nx * 12; b.vy += ny * 12;
            }
          }
        }
      }

      function kick() {
        if (paused || ended) return;
        const d = dist(player, ball);
        if (d > 38) {
          beep(120, .025, "square", .02);
          return;
        }
        kickFrom(player, 255);
      }

      function kickFrom(p, power, forcedAngle) {
        const angle = forcedAngle ?? Math.atan2(ball.y - p.y, ball.x - p.x);
        ball.vx = Math.cos(angle) * power + p.vx * .25;
        ball.vy = Math.sin(angle) * power + p.vy * .25;
        p.cool = .24;
        shake = .7;
        beep(p.team === "you" ? 760 : 330, .045, "square", .045);
      }

      function score(side) {
        if (side === "you") youScore += 1;
        else cpuScore += 1;
        updateHud();

        messageTimer = 1.25;
        shake = 1.1;
        beep(side === "you" ? 880 : 180, .16, "square", .075);
        resetPositions(side);
      }

      function render() {
        ctx.save();
        ctx.clearRect(0, 0, W, H);

        if (shake > 0) {
          const s = Math.sin(performance.now() * .08) * shake;
          ctx.translate(s, -s * .4);
        }

        drawLCDBackground();
        drawField();
        drawGhostGrid();

        drawPlayer(player, true);
        friends.forEach((p) => drawPlayer(p, false));
        enemies.forEach((p) => drawPlayer(p, false));
        drawBall();

        if (messageTimer > 0) drawLCDText("GOAL!", W / 2 - 41, H / 2 - 9, 4);

        ctx.restore();
      }

      function drawLCDBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#a9b982");
        grad.addColorStop(1, "#87955f");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        ctx.globalAlpha = .08;
        for (let y = 0; y < H; y += 4) {
          ctx.fillStyle = "#10160f";
          ctx.fillRect(0, y, W, 1);
        }
        ctx.globalAlpha = 1;
      }

      function drawField() {
        lcdRect(field.x, field.y, field.w, 4, .34);
        lcdRect(field.x, field.y + field.h - 4, field.w, 4, .34);
        lcdRect(field.x, field.y, 4, goalY - field.y, .34);
        lcdRect(field.x, goalY + goalH, 4, field.y + field.h - (goalY + goalH), .34);
        lcdRect(field.x + field.w - 4, field.y, 4, goalY - field.y, .34);
        lcdRect(field.x + field.w - 4, goalY + goalH, 4, field.y + field.h - (goalY + goalH), .34);

        for (let y = field.y + 8; y < field.y + field.h - 8; y += 18) {
          lcdRect(W / 2 - 2, y, 4, 8, .22);
        }

        lcdRect(field.x - goalW, goalY, goalW, goalH, .28);
        lcdRect(field.x + field.w, goalY, goalW, goalH, .28);
        lcdRect(field.x + 4, H / 2 - 56, 50, 112, .18);
        lcdRect(field.x + field.w - 54, H / 2 - 56, 50, 112, .18);

        ctx.strokeStyle = "rgba(30,40,28,.28)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(W / 2, H / 2, 42, 0, Math.PI * 2);
        ctx.stroke();
      }

      function drawGhostGrid() {
        ctx.fillStyle = "rgba(30,40,28,.11)";
        for (let x = field.x + 17; x < field.x + field.w; x += 24) {
          for (let y = field.y + 15; y < field.y + field.h; y += 24) {
            ctx.fillRect(snap(x), snap(y), 5, 5);
          }
        }
      }

      function drawPlayer(p, controlled) {
        const active = p.team === "you" || p.team === "friend" ? 1 : .76;
        const x = snap(p.x - p.size / 2);
        const y = snap(p.y - p.size / 2);

        if (p.team === "cpu") {
          ctx.fillStyle = "rgba(30,40,28,.42)";
          block(x, y, 14, 14, active);
          block(x + 4, y - 6, 6, 4, active);
        } else {
          ctx.fillStyle = "rgba(30,40,28,.88)";
          block(x, y, 14, 14, active);
          if (controlled) {
            block(x - 5, y + 4, 3, 6, active);
            block(x + 16, y + 4, 3, 6, active);
          }
        }

        const footX = p.x + Math.cos(p.angle) * 11;
        const footY = p.y + Math.sin(p.angle) * 11;
        block(snap(footX - 3), snap(footY - 3), 6, 6, active);
      }

      function drawBall() {
        block(snap(ball.x - 5), snap(ball.y - 5), 10, 10, 1);
        if (Math.hypot(ball.vx, ball.vy) > 40) {
          block(snap(ball.x - ball.vx * .035), snap(ball.y - ball.vy * .035), 6, 6, .36);
        }
      }

      function drawLCDText(text, x, y, scale) {
        const glyphs = {
          "G": ["111","100","101","101","111"],
          "O": ["111","101","101","101","111"],
          "A": ["111","101","111","101","101"],
          "L": ["100","100","100","100","111"],
          "!": ["1","1","1","0","1"]
        };
        let cx = x;
        ctx.fillStyle = "rgba(30,40,28,.92)";
        for (const ch of text) {
          const g = glyphs[ch];
          if (!g) { cx += 2 * scale; continue; }
          g.forEach((row, yy) => {
            [...row].forEach((bit, xx) => {
              if (bit === "1") ctx.fillRect(cx + xx * scale, y + yy * scale, scale - 1, scale - 1);
            });
          });
          cx += (g[0].length + 1) * scale;
        }
      }

      function block(x, y, w, h, alpha) {
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "#1e281c";
        ctx.fillRect(x, y, w, h);
        ctx.globalAlpha = 1;
      }

      function lcdRect(x, y, w, h, alpha) {
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "#1e281c";
        ctx.fillRect(snap(x), snap(y), snap(w), snap(h));
        ctx.globalAlpha = 1;
      }

      function snap(n) { return Math.round(n / cell) * cell; }
      function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
      function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

      function beep(freq, duration, type, gain) {
        if (!soundOn) return;
        try {
          audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
          const t = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t);
          g.gain.setValueAtTime(gain, t);
          g.gain.exponentialRampToValueAtTime(0.0001, t + duration);
          osc.connect(g);
          g.connect(audioCtx.destination);
          osc.start(t);
          osc.stop(t + duration);
        } catch (e) {}
      }

      let lastWallBeep = 0;
      function wallBeep() {
        const now = performance.now();
        if (now - lastWallBeep > 90) {
          lastWallBeep = now;
          beep(155, .018, "square", .018);
        }
      }

      function bindHoldButton(selector, onDown, onUp) {
        document.querySelectorAll(selector).forEach((btn) => {
          const down = (e) => {
            e.preventDefault();
            btn.setPointerCapture?.(e.pointerId);
            btn.classList.add("down");
            onDown(btn);
          };
          const up = (e) => {
            e.preventDefault();
            btn.classList.remove("down");
            onUp(btn);
          };
          btn.addEventListener("pointerdown", down);
          btn.addEventListener("pointerup", up);
          btn.addEventListener("pointercancel", up);
          btn.addEventListener("pointerleave", up);
        });
      }

      bindHoldButton("[data-dir]", (btn) => {
        const dir = btn.dataset.dir;
        if (dir === "up") keys.add("ArrowUp");
        if (dir === "down") keys.add("ArrowDown");
        if (dir === "left") keys.add("ArrowLeft");
        if (dir === "right") keys.add("ArrowRight");
      }, (btn) => {
        const dir = btn.dataset.dir;
        if (dir === "up") keys.delete("ArrowUp");
        if (dir === "down") keys.delete("ArrowDown");
        if (dir === "left") keys.delete("ArrowLeft");
        if (dir === "right") keys.delete("ArrowRight");
      });

      kickBtn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        kickBtn.classList.add("down");
        kick();
      });
      ["pointerup", "pointercancel", "pointerleave"].forEach((name) => {
        kickBtn.addEventListener(name, () => kickBtn.classList.remove("down"));
      });

      window.addEventListener("keydown", (e) => {
        const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," ","w","a","s","d"].includes(k)) {
          e.preventDefault();
        }
        if (k === " ") kick();
        else keys.add(k);
      });

      window.addEventListener("keyup", (e) => {
        const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        keys.delete(k);
      });

      startBtn.addEventListener("click", () => {
        if (ended || !running) startGame();
        else hideOverlay();
      });
      restartBtn.addEventListener("click", startGame);
      soundBtn.addEventListener("click", () => {
        soundOn = !soundOn;
        soundBtn.textContent = soundOn ? "sound on" : "sound off";
        if (soundOn) beep(520, .04, "square", .04);
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && running && !ended) {
          showOverlay("Paused", "Tap resume to keep playing.", "Resume");
        }
      });

      resetPositions();
      updateHud();
      requestAnimationFrame(step);
    })();
  </script>
</body>
</html>
