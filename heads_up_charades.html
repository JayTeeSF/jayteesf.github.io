<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#06101e"><title>Heads-Up Charades — JayTeeSF</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;color:#f8fbff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Inter,Arial,sans-serif}body{background:radial-gradient(900px 540px at 15% -10%,rgba(33,212,253,.30),transparent 60%),radial-gradient(760px 520px at 100% 5%,rgba(255,79,154,.26),transparent 60%),linear-gradient(135deg,#05101b,#0b1026);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 20% 30%,rgba(255,255,255,.15) 0 1px,transparent 1.5px),radial-gradient(circle at 78% 24%,rgba(255,255,255,.11) 0 1px,transparent 1.5px)}body.playing{overflow:hidden;position:fixed;inset:0;width:100%}.app{width:min(1060px,100%);margin:0 auto;padding:calc(18px + env(safe-area-inset-top,0px)) 14px calc(30px + env(safe-area-inset-bottom,0px));position:relative}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#21d4fd,#ff4f9a);font-size:1.45rem}h1,h2,h3,p{margin-top:0}h1{font-size:clamp(1.5rem,6vw,2.5rem);line-height:.96;letter-spacing:-.045em;margin-bottom:4px}.brand p,.muted{color:rgba(248,251,255,.68);line-height:1.42;margin-bottom:0}.screen{display:grid;gap:14px}.card{border:1px solid rgba(255,255,255,.14);border-radius:30px;background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.055));box-shadow:0 24px 75px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.12);padding:18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}.hero{min-height:260px;display:grid;align-items:end;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:280px;height:280px;border-radius:50%;right:-80px;top:-90px;background:radial-gradient(circle,rgba(33,212,253,.34),transparent 68%)}.eyebrow{text-transform:uppercase;letter-spacing:.13em;font-weight:950;color:#a3e635;font-size:.75rem}h2{font-size:clamp(2.2rem,10vw,5.6rem);line-height:.92;letter-spacing:-.06em;margin-bottom:14px;text-wrap:balance}h3{font-size:1.2rem;letter-spacing:-.03em;margin-bottom:12px}.grid{display:grid;gap:14px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,1fr)}button,input,textarea{font:inherit}button{border:0;border-radius:999px;color:#f8fbff;background:rgba(255,255,255,.11);padding:14px 16px;font-weight:900;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);cursor:pointer;touch-action:manipulation}button:active{transform:scale(.97)}.primary{background:linear-gradient(135deg,#21d4fd,#8b5cf6)}.correct{background:linear-gradient(135deg,#16a34a,#a3e635);color:#07120a}.pass{background:linear-gradient(135deg,#fb923c,#ff4f9a)}.icon-btn{width:48px;height:48px;padding:0}.wide{width:100%;min-height:60px}input,textarea{width:100%;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.22);color:#f8fbff;border-radius:18px;padding:14px;font-weight:750;outline:none}textarea{min-height:138px;resize:vertical}label{display:grid;gap:7px;margin-top:12px;color:rgba(248,251,255,.68);font-weight:850}.toggle{grid-template-columns:auto 1fr;align-items:center}.toggle input{width:20px;height:20px}.deck-list{display:grid;gap:9px}.deck-btn{text-align:left;border-radius:22px;display:flex;justify-content:space-between;align-items:center;gap:12px}.deck-btn.active{background:linear-gradient(135deg,rgba(33,212,253,.24),rgba(255,79,154,.18))}.badge{border-radius:999px;background:rgba(0,0,0,.22);padding:7px 10px}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:.18em .45em}
body.playing .app{width:100%;height:100dvh;padding:0;margin:0;overflow:hidden}body.playing .topbar{display:none}body.playing .screen{height:100dvh;display:block;overflow:hidden}.play{position:fixed;inset:0;min-height:100dvh;width:100%;display:grid;grid-template-rows:auto 1fr auto;padding:calc(14px + env(safe-area-inset-top,0px)) 14px calc(14px + env(safe-area-inset-bottom,0px));border:0;border-radius:0;background:radial-gradient(740px 460px at 80% 12%,rgba(255,79,154,.16),transparent 60%),rgba(5,13,25,.72);box-shadow:none;overflow:hidden}.playtop{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;min-height:52px;z-index:2}.pill{border-radius:999px;background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.13);padding:10px 13px;font-weight:1000;font-size:clamp(.9rem,3.2vw,1.1rem);white-space:nowrap}.playgear{width:44px;height:44px;padding:0;background:rgba(255,255,255,.11)}.tilt{color:rgba(255,255,255,.66);font-weight:800;text-align:center;font-size:clamp(.72rem,2.6vw,.95rem);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.wordwrap{min-height:0;display:grid;place-items:center;text-align:center;padding:0 3vw 1vh}.deckname{color:#a3e635;font-weight:1000;letter-spacing:.22em;font-size:clamp(.78rem,2.8vw,1.18rem);text-transform:uppercase;margin-bottom:.18em}.word{max-width:96vw;color:#fff;font-weight:1000;font-size:clamp(3.2rem,15vw,10rem);line-height:.92;letter-spacing:-.035em;text-align:center;text-wrap:balance;overflow-wrap:normal;word-break:normal;text-shadow:0 20px 55px rgba(0,0,0,.35)}.word.small{font-size:clamp(2.5rem,11vw,7.2rem);letter-spacing:-.025em;line-height:.98}.playactions{display:grid;grid-template-columns:1fr 1fr;gap:12px;z-index:2}.playactions button{min-height:clamp(74px,15vh,132px);border-radius:28px;font-size:clamp(1.15rem,4vw,1.9rem);color:#fff}.playactions .correct{color:#06130a}.gameover-list{display:grid;gap:9px;margin-top:12px}.result-row{display:flex;justify-content:space-between;gap:10px;align-items:center;border-radius:18px;background:rgba(0,0,0,.20);border:1px solid rgba(255,255,255,.10);padding:12px 14px;font-weight:900}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom,0px));transform:translateX(-50%) translateY(120%);background:rgba(5,13,25,.9);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:12px 15px;font-weight:900;transition:transform .25s;z-index:20;max-width:calc(100% - 24px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{transform:translateX(-50%) translateY(0)}#importFile{display:none}@media(orientation:landscape) and (max-height:620px){.play{padding:calc(8px + env(safe-area-inset-top,0px)) 16px calc(8px + env(safe-area-inset-bottom,0px))}.playtop{min-height:42px}.pill{padding:8px 12px}.playgear{width:40px;height:40px}.word{font-size:clamp(3rem,11vw,7.5rem);line-height:.86}.word.small{font-size:clamp(2.3rem,8vw,5.4rem)}.playactions button{min-height:clamp(58px,18vh,88px);border-radius:22px}}@media(max-width:760px){.two,.three{grid-template-columns:1fr}.hero{min-height:300px}.playactions{grid-template-columns:1fr}.playactions button{min-height:clamp(68px,12vh,100px)}}@media(max-width:760px) and (orientation:landscape){.playactions{grid-template-columns:1fr 1fr}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style></head><body><main class="app"><header class="topbar"><div class="brand"><div class="logo">🎭</div><div><h1>Heads-Up Charades</h1><p>Guess the word before the timer runs out</p></div></div><button id="settingsBtn" class="icon-btn" title="Settings">⚙︎</button></header><section id="screen" class="screen"></section></main><div id="toast" class="toast" role="status" aria-live="polite"></div><script>
(()=>{"use strict";
const KEY="jayteesf-heads-up-v3";
const decks={Party:["karaoke","pizza delivery","bad haircut","roller coaster","birthday cake","magic trick","lost keys","wedding toast","dance battle","food truck","selfie stick","surprise party"],Movies:["Jurassic Park","Titanic","Star Wars","The Matrix","Toy Story","Barbie","Jaws","Rocky","Ghostbusters","Black Panther","Frozen","Indiana Jones"],Animals:["penguin","octopus","giraffe","kangaroo","sloth","raccoon","shark","llama","owl","monkey","dolphin","chicken"],Brainscape:["flashcards","study streak","spaced repetition","deck editor","confidence rating","mobile studying","exam prep","learning algorithm"]};
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>[...r.querySelectorAll(s)],now=()=>new Date().toISOString();
let state=load(),tick=null,motionReady=false,baselineBeta=null,baselineGamma=null,lastTiltAt=0,armed=true;
function fresh(){return{selectedDeck:"Party",customWords:"",seconds:60,useTilt:true,tiltThreshold:18,tiltCooldownMs:1250,flipTilt:false,game:null,history:[],updatedAt:now()}}
function load(){try{return{...fresh(),...JSON.parse(localStorage.getItem(KEY)||"{}")}}catch{return fresh()}}
function save(){state.updatedAt=now();localStorage.setItem(KEY,JSON.stringify(state))}
function haptic(p=16){if("vibrate"in navigator){try{navigator.vibrate(p)}catch{}}}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove("show"),2200)}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function activeWords(){const c=state.customWords.split(/\n|,/).map(w=>w.trim()).filter(Boolean);return c.length?c:decks[state.selectedDeck]||decks.Party}
function setPlaying(){document.body.classList.toggle("playing",!!state.game&&state.game.phase==="play")}
function render(){setPlaying();if(!state.game)return home();if(state.game.phase==="play")return play();return done()}
function home(){setPlaying();clearInterval(tick);$("#screen").innerHTML=`<section class="hero card"><div><span class="eyebrow">Charades</span><h2>Phone up. Friends act. You guess.</h2><p class="muted">Between games you can choose a deck, adjust tilt sensitivity, and add custom words. During play, the screen stays clean and does not scroll.</p></div></section><section class="grid two"><div class="card"><h3>Choose deck</h3><div class="deck-list">${Object.entries(decks).map(([n,w])=>`<button class="deck-btn ${state.selectedDeck===n?"active":""}" data-deck="${n}"><span>${esc(n)}</span><span class="badge">${w.length}</span></button>`).join("")}</div></div><div class="card"><h3>Round</h3><label>Seconds<input id="secondsInput" type="number" min="15" max="180" step="5" value="${state.seconds}"></label><label>Custom words, optional<textarea id="customWords" placeholder="One per line, or comma separated">${esc(state.customWords)}</textarea></label><label class="toggle"><input id="tiltInput" type="checkbox" ${state.useTilt?"checked":""}><span>Use tilt gestures</span></label><label>Tilt threshold: <span id="thresholdValue">${state.tiltThreshold}°</span><input id="thresholdInput" type="range" min="12" max="35" step="1" value="${state.tiltThreshold}"></label><label class="toggle"><input id="flipTiltInput" type="checkbox" ${state.flipTilt?"checked":""}><span>Flip tilt direction</span></label><button id="startBtn" class="primary wide">Start game</button></div></section>${state.history.length?`<section class="card"><h3>Recent games</h3><div class="gameover-list">${state.history.slice(0,5).map(g=>`<div class="result-row"><span>${new Date(g.completedAt).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</span><span>${g.correct} correct</span></div>`).join("")}</div></section>`:""}`;
$$("[data-deck]").forEach(b=>b.onclick=()=>{state.selectedDeck=b.dataset.deck;save();home();haptic(12)});
$("#secondsInput").oninput=e=>{state.seconds=Number(e.target.value);save()};$("#customWords").oninput=e=>{state.customWords=e.target.value;save()};$("#tiltInput").onchange=async e=>{state.useTilt=e.target.checked;save();if(state.useTilt)await enableMotion()};$("#thresholdInput").oninput=e=>{state.tiltThreshold=Number(e.target.value);$("#thresholdValue").textContent=state.tiltThreshold+"°";save()};$("#flipTiltInput").onchange=e=>{state.flipTilt=e.target.checked;save()};$("#startBtn").onclick=start}
function start(){const words=activeWords();if(words.length<3)return toast("Add at least 3 words.");const secs=Math.max(15,Math.min(180,Number(state.seconds)||60));state.game={phase:"play",words:shuffle(words),index:0,correct:[],passed:[],seconds:secs,endsAt:Date.now()+secs*1000,startedAt:now()};baselineBeta=null;baselineGamma=null;lastTiltAt=0;armed=true;save();haptic([18,30,18]);render();if(state.useTilt)enableMotion()}
function play(){setPlaying();const g=state.game,w=g.words[g.index]||activeWords()[0]||"Ready",long=w.length>12||(/\s/.test(w)&&w.length>10);$("#screen").innerHTML=`<section class="play"><div class="playtop"><div id="time" class="pill">--</div><div id="tiltStatus" class="tilt">${state.useTilt?"Hold still for tilt calibration":"Tap buttons to score"}</div><div class="pill">✓ ${g.correct.length}</div><button id="playSettingsBtn" class="playgear">⚙︎</button></div><div class="wordwrap"><div><div class="deckname">${state.customWords.trim()?"Custom":esc(state.selectedDeck)}</div><div class="word ${long?"small":""}">${esc(w)}</div></div></div><div class="playactions"><button id="passBtn" class="pass">Pass</button><button id="correctBtn" class="correct">Correct</button></div></section>`;
$("#correctBtn").onclick=()=>mark("correct","button");$("#passBtn").onclick=()=>mark("pass","button");$("#playSettingsBtn").onclick=()=>settings(true);clearInterval(tick);tick=setInterval(clock,120);clock()}
function clock(){if(!state.game||state.game.phase!=="play")return clearInterval(tick);const r=Math.max(0,Math.ceil((state.game.endsAt-Date.now())/1000)),el=$("#time");if(el)el.textContent=r+"s";if(r<=0)finish()}
function mark(kind,src){const g=state.game;if(!g||g.phase!=="play")return;const w=g.words[g.index]||activeWords()[0]||"";if(kind==="correct"){g.correct.push(w);haptic(src==="tilt"?[18,30,18]:18)}else{g.passed.push(w);haptic(src==="tilt"?[24,45,24]:[18,35,18])}g.index++;if(g.index>=g.words.length)g.words.push(...shuffle(activeWords()));save();play()}
function finish(){clearInterval(tick);if(!state.game)return;state.game.phase="done";state.game.completedAt=now();state.history.unshift({completedAt:state.game.completedAt,correct:state.game.correct.length,passed:state.game.passed.length,seconds:state.game.seconds,deck:state.customWords.trim()?"Custom":state.selectedDeck});state.history=state.history.slice(0,25);save();haptic([24,45,24,45,36]);render()}
function done(){setPlaying();const g=state.game;$("#screen").innerHTML=`<section class="hero card"><div><span class="eyebrow">Time</span><h2>${g.correct.length} correct.</h2><p class="muted">${g.passed.length} passed in ${g.seconds} seconds.</p></div></section><section class="grid two"><div class="card"><h3>Correct</h3><div class="gameover-list">${g.correct.map(w=>`<div class="result-row"><span>${esc(w)}</span><span>✓</span></div>`).join("")||"<p class='muted'>No correct guesses yet.</p>"}</div></div><div class="card"><h3>Passed</h3><div class="gameover-list">${g.passed.map(w=>`<div class="result-row"><span>${esc(w)}</span><span>↺</span></div>`).join("")||"<p class='muted'>No passes.</p>"}</div></div></section><section class="card"><div class="grid two"><button id="againBtn" class="primary wide">Play again</button><button id="homeBtn" class="wide">Home</button></div></section>`;$("#againBtn").onclick=start;$("#homeBtn").onclick=()=>{state.game=null;save();render()}}
function settings(fromGame=false){document.body.classList.remove("playing");$("#screen").innerHTML=`<section class="card"><span class="eyebrow">Settings</span><h2>Game settings</h2><p class="muted">Tilt uses a threshold, cooldown, and re-arm zone so one physical flip scores only one word.</p><label class="toggle"><input id="sTilt" type="checkbox" ${state.useTilt?"checked":""}><span>Use tilt gestures</span></label><label>Tilt threshold: <span id="sThresholdVal">${state.tiltThreshold}°</span><input id="sThreshold" type="range" min="12" max="35" step="1" value="${state.tiltThreshold}"></label><label class="toggle"><input id="sFlip" type="checkbox" ${state.flipTilt?"checked":""}><span>Flip tilt direction</span></label><div class="grid three" style="margin-top:14px"><button id="exportBtn" class="wide">Export JSON</button><button id="importBtn" class="wide">Import JSON</button><button id="resetBtn" class="wide pass">Reset all</button></div><input id="importFile" type="file" accept="application/json,.json"><button id="backBtn" class="primary wide" style="margin-top:12px">${fromGame?"Resume game":"Back"}</button></section>`;
$("#sTilt").onchange=async e=>{state.useTilt=e.target.checked;save();if(state.useTilt)await enableMotion()};$("#sThreshold").oninput=e=>{state.tiltThreshold=Number(e.target.value);$("#sThresholdVal").textContent=state.tiltThreshold+"°";save()};$("#sFlip").onchange=e=>{state.flipTilt=e.target.checked;save()};$("#backBtn").onclick=render;$("#resetBtn").onclick=()=>{if(!confirm("Reset Heads-Up Charades data on this device?"))return;state=fresh();save();render();toast("Reset complete.")};$("#exportBtn").onclick=exportState;$("#importBtn").onclick=()=>$("#importFile").click();$("#importFile").onchange=importState}
async function enableMotion(){if(motionReady)return true;try{if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){const res=await DeviceOrientationEvent.requestPermission();if(res!=="granted"){state.useTilt=false;save();toast("Motion permission not granted.");return false}}window.addEventListener("deviceorientation",onOrientation,{passive:true});motionReady=true;toast("Tilt controls enabled.");return true}catch{state.useTilt=false;save();toast("Tilt controls unavailable here.");return false}}
function delta(e){const beta=typeof e.beta==="number"?e.beta:0,gamma=typeof e.gamma==="number"?e.gamma:0;if(baselineBeta===null){baselineBeta=beta;baselineGamma=gamma;return 0}const landscape=Math.abs(window.orientation||0)===90||innerWidth>innerHeight;const raw=landscape?(gamma-baselineGamma):(beta-baselineBeta);return state.flipTilt?-raw:raw}
function onOrientation(e){if(!state.useTilt||!state.game||state.game.phase!=="play")return;const d=delta(e),status=$("#tiltStatus");if(status)status.textContent=`Tilt ${Math.round(d)}° · top up = Correct, top down = Pass`;const abs=Math.abs(d),threshold=Number(state.tiltThreshold)||18,t=Date.now();if(!armed&&abs<threshold*.38)armed=true;if(!armed)return;if(t-lastTiltAt<(Number(state.tiltCooldownMs)||1250))return;if(abs<threshold)return;armed=false;lastTiltAt=t;mark(d>0?"correct":"pass","tilt")}
function exportState(){const blob=new Blob([JSON.stringify({source:"Heads-Up Charades",state},null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`heads-up-charades-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href)}
function importState(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const parsed=JSON.parse(r.result);state={...fresh(),...(parsed.state||parsed)};save();render();toast("Imported.")}catch{toast("Import failed.")}};r.readAsText(f)}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
document.onkeydown=e=>{if(!state.game||state.game.phase!=="play")return;if(e.key==="ArrowRight")mark("correct","keyboard");if(e.key==="ArrowLeft")mark("pass","keyboard")};$("#settingsBtn").onclick=()=>settings(false);save();render();
})();
</script></body></html>
