<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07111d">
<title>Heads-Up Charades — JayTeeSF</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%}:root{--ink:#f8fbff;--muted:rgba(248,251,255,.70);--panel:rgba(255,255,255,.10);--line:rgba(255,255,255,.16);--cyan:#21d4fd;--pink:#ff4f9a;--lime:#a3e635;--orange:#fb923c;--violet:#8b5cf6;--red:#fb7185;--shadow:0 26px 80px rgba(0,0,0,.48);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Inter,Arial,sans-serif}body{color:var(--ink);background:radial-gradient(900px 540px at 14% -10%,rgba(33,212,253,.30),transparent 60%),radial-gradient(780px 520px at 100% 5%,rgba(255,79,154,.27),transparent 60%),radial-gradient(740px 560px at 50% 112%,rgba(163,230,53,.16),transparent 60%),linear-gradient(135deg,#05101b,#0b1026);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 20% 30%,rgba(255,255,255,.15) 0 1px,transparent 1.5px),radial-gradient(circle at 78% 24%,rgba(255,255,255,.11) 0 1px,transparent 1.5px),radial-gradient(circle at 70% 82%,rgba(255,255,255,.10) 0 1px,transparent 1.5px);animation:drift 8s ease-in-out infinite alternate}@keyframes drift{to{transform:translate(-10px,12px)}}.app{width:min(1060px,100%);margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 14px calc(30px + env(safe-area-inset-bottom));position:relative}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{width:54px;height:54px;border-radius:19px;display:grid;place-items:center;background:linear-gradient(135deg,var(--cyan),var(--pink));box-shadow:0 16px 42px rgba(33,212,253,.22);font-size:1.55rem}h1,h2,h3,p{margin-top:0}h1{font-size:clamp(1.5rem,6vw,2.5rem);line-height:.9;letter-spacing:-.07em;margin-bottom:4px}.brand p,.muted{color:var(--muted);line-height:1.42;margin-bottom:0}.screen{display:grid;gap:14px}.card{border:1px solid var(--line);border-radius:30px;background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.055));box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.12);padding:18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}.hero{min-height:270px;display:grid;align-items:end;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:280px;height:280px;border-radius:50%;right:-80px;top:-90px;background:radial-gradient(circle,rgba(33,212,253,.34),transparent 68%);animation:pulse 4s ease-in-out infinite}@keyframes pulse{50%{transform:scale(1.12);opacity:.85}}.eyebrow{text-transform:uppercase;letter-spacing:.13em;font-weight:950;color:var(--lime);font-size:.75rem}h2{font-size:clamp(2.2rem,10vw,5.6rem);line-height:.86;letter-spacing:-.09em;margin-bottom:14px;text-wrap:balance}h3{font-size:1.2rem;letter-spacing:-.04em;margin-bottom:12px}.grid{display:grid;gap:14px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,1fr)}button{border:0;border-radius:999px;color:var(--ink);background:rgba(255,255,255,.11);padding:14px 16px;font:inherit;font-weight:950;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);cursor:pointer;touch-action:manipulation;transition:transform .16s ease,background .16s ease,opacity .16s ease}button:hover{background:rgba(255,255,255,.17)}button:active{transform:scale(.97)}button:disabled{opacity:.45}.primary{background:linear-gradient(135deg,var(--cyan),var(--violet));box-shadow:0 18px 42px rgba(33,212,253,.20),inset 0 0 0 1px rgba(255,255,255,.20)}.correct{background:linear-gradient(135deg,#16a34a,var(--lime));color:#07120a}.pass{background:linear-gradient(135deg,var(--orange),var(--pink))}.danger{background:linear-gradient(135deg,var(--red),#f97316)}.icon-btn{width:48px;height:48px;padding:0}.wide{width:100%;min-height:62px}input,textarea{width:100%;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.22);color:var(--ink);border-radius:18px;padding:14px;font:inherit;font-weight:750;outline:none}textarea{min-height:138px;resize:vertical}label{display:grid;gap:7px;margin-top:12px;color:var(--muted);font-weight:850}.toggle{grid-template-columns:auto 1fr;align-items:center}.toggle input{width:20px;height:20px}.deck-list{display:grid;gap:9px}.deck-btn{text-align:left;border-radius:22px;display:flex;justify-content:space-between;align-items:center;gap:12px}.deck-btn.active{background:linear-gradient(135deg,rgba(33,212,253,.24),rgba(255,79,154,.18))}.badge{border-radius:999px;background:rgba(0,0,0,.22);padding:7px 10px;white-space:nowrap}.play-card{min-height:72svh;display:grid;place-items:center;text-align:center;position:relative;overflow:hidden}.word{font-size:clamp(3.2rem,17vw,8.8rem);line-height:.84;letter-spacing:-.09em;font-weight:1000;text-wrap:balance;text-shadow:0 20px 55px rgba(0,0,0,.35)}.timer{position:absolute;top:18px;left:18px;border-radius:999px;background:rgba(0,0,0,.30);border:1px solid rgba(255,255,255,.13);padding:10px 13px;font-weight:1000}.score{position:absolute;top:18px;right:18px;border-radius:999px;background:rgba(0,0,0,.30);border:1px solid rgba(255,255,255,.13);padding:10px 13px;font-weight:1000}.tilt{position:absolute;left:18px;right:18px;top:62px;color:var(--muted);font-weight:850;font-size:.86rem}.actions{position:absolute;left:18px;right:18px;bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions button{min-height:74px;border-radius:24px;font-size:1.1rem}.gameover-list{display:grid;gap:9px;margin-top:12px}.result-row{display:flex;justify-content:space-between;gap:10px;align-items:center;border-radius:18px;background:rgba(0,0,0,.20);border:1px solid rgba(255,255,255,.10);padding:12px 14px;font-weight:900}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:.18em .45em}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(120%);background:rgba(5,13,25,.92);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:12px 15px;font-weight:900;box-shadow:0 20px 55px rgba(0,0,0,.45);transition:transform .25s ease;z-index:20;max-width:calc(100% - 24px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{transform:translateX(-50%) translateY(0)}#importFile{display:none}.help{border-left:3px solid rgba(163,230,53,.65);padding-left:12px;color:var(--muted);line-height:1.45}@media(max-width:760px){.two,.three{grid-template-columns:1fr}.hero{min-height:310px}.play-card{min-height:75svh}.actions{grid-template-columns:1fr}.word{font-size:clamp(3rem,21vw,8rem)}.topbar{align-items:flex-start}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><div class="logo">🎭</div><div><h1>Heads-Up Charades</h1><p>Guess the word before the timer runs out</p></div></div><button id="settingsBtn" class="icon-btn" title="Settings">⚙︎</button></header>
<section id="screen" class="screen"></section>
</main>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(() => {
  "use strict";
  const KEY = "jayteesf-heads-up-v2";
  const decks = {
    Party:["karaoke","pizza delivery","bad haircut","roller coaster","birthday cake","magic trick","lost keys","wedding toast","dance battle","food truck","selfie stick","surprise party","mime","air guitar"],
    Movies:["Jurassic Park","Titanic","Star Wars","The Matrix","Toy Story","Barbie","Jaws","Rocky","Ghostbusters","Black Panther","Frozen","Indiana Jones"],
    Animals:["penguin","octopus","giraffe","kangaroo","sloth","raccoon","shark","llama","owl","monkey","dolphin","chicken"],
    Brainscape:["flashcards","study streak","spaced repetition","deck editor","confidence rating","mobile studying","exam prep","learning algorithm"]
  };
  const $ = (s,r=document) => r.querySelector(s);
  const $$ = (s,r=document) => [...r.querySelectorAll(s)];
  const now = () => new Date().toISOString();
  let state = load();
  let tick = null;
  let motionReady = false;
  let baselineBeta = null;
  let lastTiltAt = 0;
  let lastMotionAt = 0;

  function fresh(){ return { selectedDeck:"Party", customWords:"", seconds:60, useTilt:true, flipTilt:false, game:null, history:[], updatedAt:now() }; }
  function load(){ try { return { ...fresh(), ...JSON.parse(localStorage.getItem(KEY) || "{}") }; } catch { return fresh(); } }
  function save(){ state.updatedAt = now(); localStorage.setItem(KEY, JSON.stringify(state)); }
  function haptic(p=16){ if("vibrate" in navigator){ try{ navigator.vibrate(p); }catch{} } }
  function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toast.t); toast.t=setTimeout(()=>t.classList.remove("show"),2300); }
  function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function activeWords(){ const custom = state.customWords.split(/\r?\n|,/).map(w=>w.trim()).filter(Boolean); return custom.length ? custom : (decks[state.selectedDeck] || decks.Party); }

  function render(){ if(!state.game) return home(); if(state.game.phase === "play") return play(); return done(); }

  function home(){
    clearInterval(tick);
    $("#screen").innerHTML = `
      <section class="hero card"><div><span class="eyebrow">Charades</span><h2>Start here. Then hold the phone up.</h2><p class="muted">Tap <strong>Start game</strong>. During play, use buttons, keyboard arrows, or portrait-phone tilt: top edge up = Correct, top edge down = Pass.</p></div></section>
      <section class="grid two">
        <div class="card"><h3>Choose deck</h3><div class="deck-list">${Object.entries(decks).map(([name,ws])=>`<button class="deck-btn ${state.selectedDeck===name?"active":""}" data-deck="${name}"><span>${name}</span><span class="badge">${ws.length}</span></button>`).join("")}</div></div>
        <div class="card"><h3>Round</h3>
          <label>Seconds<input id="secondsInput" type="number" min="15" max="180" step="5" value="${state.seconds}"></label>
          <label>Custom words, optional<textarea id="customWords" placeholder="One per line, or comma separated">${esc(state.customWords)}</textarea></label>
          <label class="toggle"><input id="tiltInput" type="checkbox" ${state.useTilt?"checked":""}><span>Use portrait tilt controls</span></label>
          <label class="toggle"><input id="flipTiltInput" type="checkbox" ${state.flipTilt?"checked":""}><span>Flip tilt direction</span></label>
          <p class="help">iOS asks for motion permission only after a tap. If tilt is enabled, Start game requests that permission and calibrates the current phone angle.</p>
          <button id="startBtn" class="primary wide">Start game</button>
        </div>
      </section>
      ${state.history.length ? `<section class="card"><h3>Recent games</h3><div class="gameover-list">${state.history.slice(0,5).map(g=>`<div class="result-row"><span>${new Date(g.completedAt).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</span><span>${g.correct} correct</span></div>`).join("")}</div></section>` : ""}
    `;
    $$('[data-deck]').forEach(b => b.onclick = () => { state.selectedDeck=b.dataset.deck; save(); home(); haptic(12); });
    $('#secondsInput').oninput = e => { state.seconds = Number(e.target.value); save(); };
    $('#customWords').oninput = e => { state.customWords = e.target.value; save(); };
    $('#tiltInput').onchange = e => { state.useTilt = e.target.checked; save(); };
    $('#flipTiltInput').onchange = e => { state.flipTilt = e.target.checked; save(); };
    $('#startBtn').onclick = startGame;
  }

  async function startGame(){
    const ws = activeWords();
    if(ws.length < 3) return toast("Add at least 3 words.");
    if(state.useTilt) await enableMotion();
    baselineBeta = null;
    const secs = Math.max(15, Math.min(180, Number(state.seconds) || 60));
    state.game = { phase:"play", words:shuffle(ws), index:0, correct:[], passed:[], seconds:secs, endsAt:Date.now()+secs*1000, startedAt:now() };
    save(); haptic([18,30,18]); render();
  }

  function play(){
    const g = state.game;
    const word = g.words[g.index] || activeWords()[0];
    $("#screen").innerHTML = `
      <section class="card play-card">
        <div id="time" class="timer">--</div><div class="score">✓ ${g.correct.length}</div>
        <div id="tiltStatus" class="tilt">${state.useTilt ? "Tilt armed: top up = Correct, top down = Pass" : "Tilt off"}</div>
        <div><span class="eyebrow">${state.customWords.trim()?"Custom":esc(state.selectedDeck)}</span><div class="word">${esc(word)}</div><p class="muted">Buttons: Correct / Pass · Keyboard: <span class="kbd">→</span> / <span class="kbd">←</span></p></div>
        <div class="actions"><button id="passBtn" class="pass">Pass</button><button id="correctBtn" class="correct">Correct</button></div>
      </section>`;
    $('#correctBtn').onclick = () => mark('correct');
    $('#passBtn').onclick = () => mark('pass');
    clearInterval(tick); tick = setInterval(clock, 120); clock();
  }

  function clock(){
    if(!state.game || state.game.phase !== 'play') return clearInterval(tick);
    const remain = Math.max(0, Math.ceil((state.game.endsAt - Date.now())/1000));
    const el = $('#time'); if(el) el.textContent = `${remain}s`;
    if(remain <= 0) finish();
  }

  function mark(kind){
    const g = state.game;
    if(!g || g.phase !== 'play') return;
    const word = g.words[g.index] || activeWords()[0];
    if(kind === 'correct'){ g.correct.push(word); haptic(18); }
    else { g.passed.push(word); haptic([18,35,18]); }
    g.index++;
    if(g.index >= g.words.length) g.words.push(...shuffle(activeWords()));
    baselineBeta = null;
    save(); play();
  }

  function finish(){
    clearInterval(tick);
    if(!state.game) return;
    state.game.phase = 'done'; state.game.completedAt = now();
    state.history.unshift({ completedAt:state.game.completedAt, correct:state.game.correct.length, passed:state.game.passed.length, seconds:state.game.seconds, deck:state.customWords.trim()?"Custom":state.selectedDeck });
    state.history = state.history.slice(0,25);
    save(); haptic([24,45,24,45,36]); render();
  }

  function done(){
    const g = state.game;
    $("#screen").innerHTML = `<section class="hero card"><div><span class="eyebrow">Time</span><h2>${g.correct.length} correct.</h2><p class="muted">${g.passed.length} passed in ${g.seconds} seconds.</p></div></section><section class="grid two"><div class="card"><h3>Correct</h3><div class="gameover-list">${g.correct.map(w=>`<div class="result-row"><span>${esc(w)}</span><span>✓</span></div>`).join("") || "<p class='muted'>No correct guesses yet.</p>"}</div></div><div class="card"><h3>Passed</h3><div class="gameover-list">${g.passed.map(w=>`<div class="result-row"><span>${esc(w)}</span><span>↺</span></div>`).join("") || "<p class='muted'>No passes.</p>"}</div></div></section><section class="card"><div class="grid two"><button id="againBtn" class="primary wide">Play again</button><button id="homeBtn" class="wide">Home</button></div></section>`;
    $('#againBtn').onclick = startGame;
    $('#homeBtn').onclick = () => { state.game=null; save(); render(); };
  }

  async function enableMotion(){
    try{
      if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
        const res = await DeviceOrientationEvent.requestPermission();
        if(res !== 'granted'){ toast('Motion permission not granted; buttons still work.'); return false; }
      }
      if(!motionReady){
        window.addEventListener('deviceorientation', onOrientation, true);
        window.addEventListener('devicemotion', onMotionFallback, true);
        motionReady = true;
      }
      toast('Tilt controls enabled. Hold phone still to calibrate.');
      return true;
    }catch{ toast('Tilt controls unavailable here; buttons still work.'); return false; }
  }

  function tiltAction(action){
    const nowMs = Date.now();
    if(nowMs - lastTiltAt < 900) return;
    lastTiltAt = nowMs;
    mark(action);
  }

  function onOrientation(e){
    if(!state.useTilt || !state.game || state.game.phase !== 'play' || typeof e.beta !== 'number') return;
    if(baselineBeta === null){ baselineBeta = e.beta; return; }
    const delta = e.beta - baselineBeta;
    const threshold = 28;
    const status = $('#tiltStatus');
    if(status) status.textContent = `Tilt delta ${Math.round(delta)}° · top up = Correct, top down = Pass`;
    if(Math.abs(delta) < threshold) return;
    const upMeansCorrect = !state.flipTilt;
    if(delta < -threshold) tiltAction(upMeansCorrect ? 'correct' : 'pass');
    if(delta > threshold) tiltAction(upMeansCorrect ? 'pass' : 'correct');
  }

  function onMotionFallback(e){
    if(!state.useTilt || !state.game || state.game.phase !== 'play') return;
    if(Date.now() - lastMotionAt < 900) return;
    const y = e.accelerationIncludingGravity && e.accelerationIncludingGravity.y;
    if(typeof y !== 'number') return;
    if(Math.abs(y) < 8.5) return;
    lastMotionAt = Date.now();
    const upMeansCorrect = !state.flipTilt;
    if(y < -8.5) tiltAction(upMeansCorrect ? 'correct' : 'pass');
    if(y > 8.5) tiltAction(upMeansCorrect ? 'pass' : 'correct');
  }

  function settings(){
    clearInterval(tick);
    $('#screen').innerHTML = `<section class="card"><span class="eyebrow">Settings</span><h2>Game data</h2><p class="muted">Progress is saved locally on this device.</p><div class="grid three" style="margin-top:14px"><button id="exportBtn" class="wide">Export JSON</button><button id="importBtn" class="wide">Import JSON</button><button id="resetBtn" class="wide danger">Reset all</button></div><input id="importFile" type="file" accept="application/json,.json"><button id="backBtn" class="primary wide" style="margin-top:12px">Back</button></section>`;
    $('#backBtn').onclick = render;
    $('#resetBtn').onclick = () => { if(!confirm('Reset Heads-Up Charades data on this device?')) return; state=fresh(); save(); render(); toast('Reset complete.'); };
    $('#exportBtn').onclick = () => { const blob=new Blob([JSON.stringify({source:'Heads-Up Charades', state}, null, 2)], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`heads-up-charades-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href); };
    $('#importBtn').onclick = () => $('#importFile').click();
    $('#importFile').onchange = e => { const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{ try{ const parsed=JSON.parse(r.result); state={...fresh(), ...(parsed.state || parsed)}; save(); render(); toast('Imported.'); }catch{ toast('Import failed.'); } }; r.readAsText(file); };
  }

  function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
  document.addEventListener('keydown', e => { if(!state.game || state.game.phase !== 'play') return; if(e.key === 'ArrowRight') mark('correct'); if(e.key === 'ArrowLeft') mark('pass'); });
  $('#settingsBtn').onclick = settings;
  save(); render();
})();
</script>
</body>
</html>
